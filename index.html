// ---------- persistência local ----------
const LS_STATE="guava_state_v1", LS_CFG="guava_cfg_v1";
function carregarLocal(){
  try{ const s=localStorage.getItem(LS_STATE); if(s) state={...state,...JSON.parse(s)}; else state.itens=seed; }
  catch{ state.itens=seed; }
  try{ const c=localStorage.getItem(LS_CFG); if(c){ const padraoFb=cfg.firebase; cfg={...cfg,...JSON.parse(c)}; if(!cfg.firebase) cfg.firebase=padraoFb; } }catch{}

  if(!cfg.funcaoUrl && FUNCAO_URL_PADRAO) cfg.funcaoUrl = FUNCAO_URL_PADRAO;

function salvarLocal(){ try{ localStorage.setItem(LS_STATE,JSON.stringify(state)); }catch{} }
function salvarCfg(){ try{ localStorage.setItem(LS_CFG,JSON.stringify(cfg)); }catch{} }

let saveTimer=null;
function salvar(){
  salvarLocal();
  flashSave();
  if(fb.ref){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{ gravarFirebase(); }, 600);

}
function flashSave(){
  const t=document.getElementById("saveTag");
  t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1100);

// ---------- Retenção de histórico para recalibragem do modelo ----------
// Registra um snapshot por dia dos indicadores-chave, formando série temporal.
function registrarSnapshot(){
  const hoje=new Date().toISOString().slice(0,10);
  state.serieHistorica=state.serieHistorica||[];
  // no máximo um snapshot por dia (atualiza o do dia se já existir)
  const p=projecao(), m=p[0];
  const esc=calcularEscore(p,state.renda,state.metaPct);
  const pred=calcularEscorePreditivo(state.renda,state.metaPct);
  const snap={
    data:hoje, ts:Date.now(),
    renda:state.renda, metaPct:state.metaPct, horizonte:state.horizonte,
    gastoMes:Math.round(m.total),
    composicao:{fixo:Math.round(m.fixo),estimado:Math.round(m.estimado),eventual:Math.round(m.eventual),parcela:Math.round(m.parcela)},
    escoreAtual:esc.score, escorePreditivo:pred.indisponivel?null:pred.score,
    gapMeses:esc.gapMeses, qtdItens:state.itens.length,
    qtdParcelas:state.itens.filter(i=>i.natureza==="parcela").length,
    saldoParcelas:Math.round(state.itens.filter(i=>i.natureza==="parcela").reduce((s,i)=>s+(+i.valor||0)*(+i.restam||0),0)),
    receitasExtras:Math.round((state.receitas||[]).reduce((s,r)=>s+(+r.valor||0),0)),
    qtdReceitas:(state.receitas||[]).length,
  };
  const idx=state.serieHistorica.findIndex(s=>s.data===hoje);
  if(idx>=0) state.serieHistorica[idx]=snap; else state.serieHistorica.push(snap);
  // mantém no máximo ~400 snapshots (mais de um ano) para não inflar storage
  if(state.serieHistorica.length>400) state.serieHistorica=state.serieHistorica.slice(-400);
  salvarLocal();
}
// exporta a série como CSV (para análise externa / recalibragem do modelo)
function exportarSerieCSV(){
  const s=state.serieHistorica||[];
  if(!s.length) return null;
  const cab="data,renda,metaPct,horizonte,gastoMes,fixo,estimado,eventual,parcela,escoreAtual,escorePreditivo,gapMeses,qtdItens,qtdParcelas,saldoParcelas,receitasExtras,qtdReceitas";
  const linhas=s.map(x=>[x.data,x.renda,x.metaPct,x.horizonte,x.gastoMes,x.composicao.fixo,x.composicao.estimado,x.composicao.eventual,x.composicao.parcela,x.escoreAtual,x.escorePreditivo??"",x.gapMeses,x.qtdItens,x.qtdParcelas,x.saldoParcelas,x.receitasExtras??0,x.qtdReceitas??0].join(","));
  return cab+"\n"+linhas.join("\n");
}

// ---------- Firebase (carregado só se configurado) ----------
async function iniciarFirebase(){
  if(!cfg.firebase) return;
  try{
    const [{initializeApp},{getFirestore,doc,getDoc,setDoc,onSnapshot},{getAuth,signInAnonymously,onAuthStateChanged}]=await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"),
    ]);
    fb.app=initializeApp(cfg.firebase);
    fb.db=getFirestore(fb.app);
    fb.auth=getAuth(fb.app);
    fb._api={doc,getDoc,setDoc,onSnapshot};
    onAuthStateChanged(fb.auth,async(user)=>{
      if(!user){ signInAnonymously(fb.auth).catch(e=>banner("Login Firebase falhou: "+e.message)); return; }
      fb.uid=user.uid;
      fb.ref=doc(fb.db,"usuarios",user.uid);
      const snap=await getDoc(fb.ref);
      if(snap.exists()){ state={...state,...snap.data()}; salvarLocal(); render(); }
      else { await gravarFirebase(); }
      if(fb.unsub) fb.unsub();
      fb.unsub=onSnapshot(fb.ref,d=>{ if(d.exists()){ state={...state,...d.data()}; salvarLocal(); render(); }});
    });
  }catch(e){ banner("Não consegui iniciar o Firebase. Verifique a configuração em ⚙️."); }
}
async function gravarFirebase(){
  if(!fb.ref||!fb._api) return;
  try{ await fb._api.setDoc(fb.ref,state,{merge:true}); }
  catch(e){ /* mantém local; tenta de novo no próximo save */ }
}

// ---------- projeção ----------
function gastoDoMes(i){
  let fixo=0,estimado=0,eventual=0,parcela=0;
  for(const it of state.itens){
    if(it.natureza==="ordinaria") fixo+=+it.valor||0;
    else if(it.natureza==="estimada") estimado+=provavel(it);
    else if(it.natureza==="eventual"){ if((+it.mesIdx||0)===i) eventual+=+it.valor||0; }
    else if(it.natureza==="parcela"){ if(i<(+it.restam||0)) parcela+=+it.valor||0; }
  }
  return {fixo,estimado,eventual,parcela,total:fixo+estimado+eventual+parcela};
}
// itens ativos num mês i (com valor projetado), para a tela de detalhe
function itensDoMes(i){
  const out=[];
  for(const it of state.itens){
    let v=0, ativo=false;
    if(it.natureza==="ordinaria"){ v=+it.valor||0; ativo=true; }
    else if(it.natureza==="estimada"){ v=provavel(it); ativo=true; }
    else if(it.natureza==="eventual"){ if((+it.mesIdx||0)===i){ v=+it.valor||0; ativo=true; } }
    else if(it.natureza==="parcela"){ if(i<(+it.restam||0)){ v=+it.valor||0; ativo=true; } }
    if(ativo) out.push({...it, _v:v, _totalParc: it.natureza==="parcela"?Math.max(Math.round((+it.total)/(+it.valor||1)),+it.restam||1):null, _parcelaNum: it.natureza==="parcela"?(Math.max(Math.round((+it.total)/(+it.valor||1)),+it.restam||1)-(+it.restam||0)+i+1):null});
  }
  return out.sort((a,b)=>b._v-a._v);
}

// ===== MOTOR DE ANÁLISE (determinístico, funciona sem IA) =====
const Analise={
  // gasto mensal médio por categoria (considerando o mês corrente)
  porCategoria(){
    const map={};
    for(const it of itensDoMes(0)){ map[it.cat]=(map[it.cat]||0)+it._v; }
    return Object.entries(map).map(([cat,v])=>({cat,v})).sort((a,b)=>b.v-a.v);
  },
  // principais despesas dos próximos N meses, opcionalmente filtrando por categoria
  principaisProximos(nMeses, categoria){
    const acc={};
    for(let i=0;i<nMeses;i++){
      for(const it of itensDoMes(i)){
        if(categoria && it.cat!==categoria) continue;
        acc[it.nome]=acc[it.nome]||{nome:it.nome,cat:it.cat,total:0,nat:it.natureza};
        acc[it.nome].total+=it._v;
      }
    }
    return Object.values(acc).sort((a,b)=>b.total-a.total);
  },
  // simula antecipar K parcelas de um parcelamento: quanto sai do caixa agora e quanto alivia à frente
  anteciparParcela(itemId, k){
    const it=state.itens.find(x=>x.id===itemId); if(!it||it.natureza!=="parcela") return null;
    const restam=+it.restam||0, valor=+it.valor||0;
    const kReal=Math.min(k,restam);
    const desembolsoAgora=kReal*valor;
    const novoRestam=restam-kReal;
    // alívio: nos próximos kReal meses, a parcela deixa de existir mais cedo
    return {nome:it.nome, valor, restam, kReal, desembolsoAgora, novoRestam,
      mesesAliviados:kReal, economiaJuros:null};
  },
  // total comprometido em parcelas e quando "desincha"
  evolucaoParcelas(){
    const p=projecao();
    return p.map(x=>({mes:x.mes, ano:x.ano, parcela:x.parcela}));
  },
  // resumo compacto dos dados para enviar à IA
  resumoParaIA(){
    const cat=this.porCategoria();
    const p=projecao();
    return {
      renda:state.renda, metaPct:state.metaPct, horizonte:state.horizonte,
      gastoMesAtual:p[0].total, saldoMesAtual:p[0].sobra,
      porCategoria:cat,
      projecao:p.map(x=>({mes:x.mes+"/"+x.ano, gasto:Math.round(x.total), saldo:Math.round(x.sobra), parcelas:Math.round(x.parcela)})),
      parcelamentos:state.itens.filter(i=>i.natureza==="parcela").map(i=>({nome:i.nome,valor:i.valor,faltam:i.restam,cat:i.cat})),
    };
  }
};
// receita extra (não recorrente) de um mês i
function receitaExtraMes(i){
  return (state.receitas||[]).reduce((s,r)=>s+((+r.mesIdx||0)===i?(+r.valor||0):0),0);
}
function projecao(){
  const now=new Date(),out=[];
  for(let i=0;i<state.horizonte;i++){
    const g=gastoDoMes(i), ideal=state.renda*(1-state.metaPct);
    const extra=receitaExtraMes(i);
    const rendaMes=state.renda+extra;
    const mIdx=(now.getMonth()+i)%12, ano=now.getFullYear()+Math.floor((now.getMonth()+i)/12);
    out.push({...g,idx:i,mes:MESES[mIdx],ano,ideal,extra,rendaMes,sobra:rendaMes-g.total});
  }
  return out;
}

// projeção visual da home: mês anterior + atual + próximos 10 (12 colunas)
function projecaoHome(){
  const now=new Date(), out=[];
  for(let off=-1; off<=10; off++){
    const g = off<0 ? gastoMesAnterior() : gastoDoMes(off);
    const ideal=state.renda*(1-state.metaPct);
    const d=new Date(now.getFullYear(), now.getMonth()+off, 1);
    out.push({...g, off, mes:MESES[d.getMonth()], ano:d.getFullYear(),
      ideal, sobra:state.renda-g.total, atual:off===0, passado:off<0});
  }
  return out;
}
// mês anterior: aproxima usando ordinárias+estimadas (recorrentes); parcelas e eventuais
// do passado não são modeladas, então usa a base recorrente como referência histórica.
function gastoMesAnterior(){
  let fixo=0,estimado=0;
  for(const it of state.itens){
    if(it.natureza==="ordinaria") fixo+=+it.valor||0;
    else if(it.natureza==="estimada") estimado+=provavel(it);
  }
  // assume que as parcelas atuais também existiam no mês anterior (visão conservadora)
  let parcela=0;
  for(const it of state.itens) if(it.natureza==="parcela" && (+it.restam||0)>0) parcela+=+it.valor||0;
  return {fixo,estimado,eventual:0,parcela,total:fixo+estimado+parcela};
}

// ---- Núcleo prospectivo: os 4 fatores sobre uma janela de projeção ----
function escoreProspectivo(p, renda, metaPct){
  const n=p.length||1, guardarAlvo=renda*metaPct;
  const gapMeses=p.filter(x=>x.sobra<0).length;
  const gapTotal=p.reduce((s,x)=>s+(x.sobra<0?-x.sobra:0),0);
  const quaseGap=p.filter(x=>x.sobra>=0 && x.sobra<guardarAlvo).length;
  const pesoRisco=(gapMeses + 0.5*quaseGap)/n;
  const fracSemGap=Math.pow(Math.max(0,1-pesoRisco), 1.3);
  const folgaMedia=p.reduce((s,x)=>s+x.sobra,0)/n;
  const fracFolga=Math.max(0,Math.min(folgaMedia/Math.max(renda*metaPct,1),1));
  const parcelaMedia=p.reduce((s,x)=>s+x.parcela,0)/n;
  const compromisso=parcelaMedia/Math.max(renda,1);
  const fracParcela=Math.max(0,Math.min((0.30-compromisso)/0.30,1));
  const cumpreMeta=p.filter(x=>x.sobra>=guardarAlvo).length/n;
  const W={gap:0.50,folga:0.18,parcela:0.18,meta:0.14};
  const scoreFuturo=100*(W.gap*fracSemGap+W.folga*fracFolga+W.parcela*fracParcela+W.meta*cumpreMeta);
  const fatores=[
    {nome:"Sem déficit (GAP)",frac:fracSemGap,peso:W.gap},
    {nome:"Folga de caixa",frac:fracFolga,peso:W.folga},
    {nome:"Parcelas sob controle",frac:fracParcela,peso:W.parcela},
    {nome:"Meta de poupança",frac:cumpreMeta,peso:W.meta},
  ];
  return {scoreFuturo,gapMeses,gapTotal,quaseGap,fatores};
}
function faixaDe(score){
  if(score>=85) return {nome:"Excelente",cor:"#065F46"};
  if(score>=65) return {nome:"Saudável",cor:"#3E8E5A"};
  if(score>=40) return {nome:"Atenção",cor:"#E0922F"};
  return {nome:"Crítico",cor:"#FA8072"};
}

// ---- Escore PREDITIVO de 6 meses: posiciona-se no mês 6 e projeta até o fim do horizonte ----
function calcularEscorePreditivo(renda, metaPct){
  const inicio=6;
  const p=projecao(); // já respeita state.horizonte (12 ou 18)
  const janela=p.slice(inicio); // do mês 6 até o fim (12→6 meses; 18→12 meses)
  if(!janela.length){
    return {score:null, indisponivel:true, faixa:faixaDe(0), janelaMeses:0};
  }
  const pros=escoreProspectivo(janela, renda, metaPct);
  const score=Math.round(pros.scoreFuturo);
  const mesAlvo=p[inicio]?`${p[inicio].mes}/${p[inicio].ano}`:"";
  return {score, faixa:faixaDe(score), gapMeses:pros.gapMeses, gapTotal:pros.gapTotal,
    quaseGap:pros.quaseGap, fatores:pros.fatores, janelaMeses:janela.length, mesAlvo, indisponivel:false};
}

// ---- Escore de comportamento financeiro (GAP como target) + retrospectivo ----
function calcularEscore(p, renda, metaPct){
  const pros=escoreProspectivo(p, renda, metaPct);
  const {scoreFuturo,gapMeses,gapTotal,quaseGap,fatores}=pros;

  // ---- componente RETROSPECTIVO: disciplina real dos meses fechados ----
  const fechados=(state.historico||[]).filter(h=>h.fechado);
  let scoreRetro=null;
  if(fechados.length){
    let soma=0;
    for(const h of fechados){
      const prev=h.previsto||0, pago=h.pago||0, rmes=h.renda||renda;
      const dentroRenda = pago<=rmes ? 1 : Math.max(0, 1-(pago-rmes)/rmes);
      const aderiu = prev>0 ? Math.max(0, 1-Math.abs(pago-prev)/prev) : 1;
      soma += 0.6*dentroRenda + 0.4*aderiu;
    }
    scoreRetro=100*(soma/fechados.length);
  }

  // ---- combinação: histórico ganha peso até 40% conforme acumula ----
  let score, pesoRetro=0;
  if(scoreRetro!=null){
    pesoRetro=Math.min(0.40, fechados.length*0.10);
    score=Math.round((1-pesoRetro)*scoreFuturo + pesoRetro*scoreRetro);
  }else{
    score=Math.round(scoreFuturo);
  }

  const faixa=faixaDe(score);
  return {score,faixa,gapMeses,gapTotal,quaseGap,
    scoreFuturo:Math.round(scoreFuturo),
    scoreRetro:scoreRetro!=null?Math.round(scoreRetro):null,
    pesoRetro, mesesFechados:fechados.length,
    fatores};
}

// ---------- itens ----------
function lancar(item){ item.id=item.natureza[0]+Date.now()+Math.floor(Math.random()*99); state.itens=[...state.itens,item]; salvar(); }function atualizar(id,patch){ state.itens=state.itens.map(x=>x.id===id?{...x,...patch}:x); salvar(); }
function excluir(id){ if(!confirm("Excluir esta despesa?")) return; state.itens=state.itens.filter(x=>x.id!==id); salvar(); render(); }

// ---------- pagamentos e fechamento mensal ----------
function mesAtualRef(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function garanteMesRef(){
  const atual=mesAtualRef();
  if(state.mesRef!==atual){ state.mesRef=atual; state.pagosMes=state.pagosMes||{}; }
}
// Nível 1: quitar uma parcela (reduz restam em 1, registra)
function quitarParcela(id){
  const it=state.itens.find(x=>x.id===id); if(!it||it.natureza!=="parcela") return;
  if((+it.restam||0)<=0) return;
  const novo=(+it.restam)-1;
  marcarPago(id);
  if(novo<=0){ if(confirm("Esta foi a última parcela. Remover \""+it.nome+"\" das despesas?")){ excluir(id); return; } }
  atualizar(id,{restam:novo, total:(+it.valor||0)*novo});
  render();
}
// Nível 2: marcar/desmarcar despesa como paga no mês corrente
function marcarPago(id){ garanteMesRef(); state.pagosMes=state.pagosMes||{}; state.pagosMes[id]=true; salvar(); }
function togglePago(id){ garanteMesRef(); state.pagosMes=state.pagosMes||{}; if(state.pagosMes[id]) delete state.pagosMes[id]; else state.pagosMes[id]=true; salvar(); render(); }
function estaPago(id){ return !!(state.pagosMes&&state.pagosMes[id]); }
// valor de uma despesa no mês (para somar previsto/pago)
function valorMes(it){
  if(it.natureza==="estimada") return provavel(it);
  if(it.natureza==="parcela") return (+it.restam||0)>0?(+it.valor||0):0;
  if(it.natureza==="eventual") return (+it.mesIdx||0)===0?(+it.valor||0):0;
  return +it.valor||0;
}
// Nível 3: fechar o mês — tira foto previsto vs pago e guarda no histórico
function fecharMes(){
  garanteMesRef();
  const ym=state.mesRef;
  let previsto=0, pago=0;
  for(const it of state.itens){
    const v=valorMes(it); previsto+=v;
    if(estaPago(it.id)) pago+=v;
  }
  if(!confirm("Fechar o mês "+ym+"?\nPrevisto: "+fmt(previsto)+"\nPago: "+fmt(pago)+"\n\nIsso registra o mês no histórico e libera o próximo.")) return;
  state.historico=state.historico||[];
  // substitui se já existir registro do mesmo mês
  state.historico=state.historico.filter(h=>h.ym!==ym);
  state.historico.push({ym, previsto:Math.round(previsto), pago:Math.round(pago), renda:state.renda, fechado:true});
  state.historico.sort((a,b)=>a.ym<b.ym?-1:1);
  // avança: zera marcações e parcelas pagas já caíram via quitarParcela
  state.pagosMes={};
  state.mesRef=mesAtualRef();
  salvar(); render();
  alert("Mês "+ym+" fechado e registrado no histórico ✓");
}

function render(){

  else if(tab==="proj") app.innerHTML=viewProj();

  else if(tab==="metas") app.innerHTML=viewMetas();

function renderNav(){
  const items=[["inicio","⌂","Início"],["proj","◔","Projeção"],["despesas","▤","Despesas"],["metas","◎","Metas"],["add","+","Adicionar"],["saiba","?","Saiba+"]];

}

// Card "Visão de Futuro": gráfico de área em camadas + donut do escore sobreposto
function cardVisaoFuturo(p, esc){
  const W=320, H=170;
  const serie=p.map(x=>x.total);
  const maxV=Math.max(state.renda, ...serie)*1.1, minV=0;
  const n=serie.length;
  const px=i=>(i/(n-1))*W;
  const py=v=>H-((v-minV)/(maxV-minV))*H;
  // caminho suave (curva) para a linha de gasto
  function pathDe(vals){
    let d=`M0 ${py(vals[0])}`;
    for(let i=1;i<vals.length;i++){
      const x0=px(i-1),y0=py(vals[i-1]),x1=px(i),y1=py(vals[i]);
      const xc=(x0+x1)/2;
      d+=` C ${xc} ${y0}, ${xc} ${y1}, ${x1} ${y1}`;
    }
    return d;
  }
  const linha=pathDe(serie);
  const area=linha+` L ${W} ${H} L 0 ${H} Z`;
  // camadas decorativas de fundo (ondas) — estética orgânica do doc
  const onda=(amp,off,op,cor)=>{
    const vals=serie.map((v,i)=>v*0.55 + amp*Math.sin(i/1.6+off));
    return `<path d="${pathDe(vals)} L ${W} ${H} L 0 ${H} Z" fill="${cor}" opacity="${op}"/>`;
  };
  const rendaY=py(state.renda);
  const pontos=serie.map((v,i)=>`<circle cx="${px(i)}" cy="${py(v)}" r="3.5" fill="#fff" opacity="${i===0?1:.7}"/>`).join("");
  // marca o pico (último) com bolinha rosa, como na imagem
  const ult=n-1;
  const picoRosa=`<circle cx="${px(ult)}" cy="${py(serie[ult])}" r="6" fill="var(--gpink)"/><circle cx="${px(ult)}" cy="${py(serie[ult])}" r="11" fill="var(--gpink)" opacity="0.25"/>`;
  const ang=esc.score*3.6;
  const meses=p.map(x=>x.mes);
  const lblMeses=meses.map((mes,i)=> (i%Math.ceil(n/7)===0)?`<span style="flex:1;text-align:center">${mes}</span>`:`<span style="flex:1"></span>`).join("");
  return `<div class="card" style="background:var(--grad-dash);border:none;color:#fff;padding:16px 14px 12px;position:relative;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
      <span style="font-size:16px;font-weight:800;color:#fff">Visão de Futuro <span style="color:var(--cyan);font-weight:600">(${state.horizonte} meses)</span></span>
    </div>
    <div style="position:relative">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="display:block;overflow:visible">
        <defs>
          <linearGradient id="gArea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00C49F" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#00C49F" stop-opacity="0.05"/>
          </linearGradient>
        </defs>
        ${onda(8,0,0.18,"#0E6E66")}
        ${onda(6,2,0.22,"#0B4F6C")}
        <path d="${area}" fill="url(#gArea)"/>
        <path d="${linha}" fill="none" stroke="#7DE8D2" stroke-width="2.5"/>
        <line x1="0" y1="${rendaY}" x2="${W}" y2="${rendaY}" stroke="#fff" stroke-dasharray="4 4" opacity="0.35"/>
        ${pontos}${picoRosa}
      </svg>
      <!-- balão renda no topo -->
      <div style="position:absolute;top:-2px;right:0;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);border-radius:12px;padding:4px 10px;font-size:12px;font-weight:800">${fmt(state.renda)}</div>
      <!-- donut do escore sobreposto ao centro -->
      <div style="position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);text-align:center">
        <div style="font-size:10px;font-weight:700;color:var(--cyan);margin-bottom:4px;text-shadow:0 1px 3px rgba(0,0,0,.4)">Comportamento</div>
        <div style="width:96px;height:96px;border-radius:50%;background:conic-gradient(var(--ggreen) ${ang}deg, rgba(255,255,255,.18) ${ang}deg);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.3)">
          <div style="width:78px;height:78px;border-radius:50%;background:#0A2540;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <span style="font-size:26px;font-weight:800;color:#fff;line-height:1">${esc.score}<span style="font-size:11px;color:var(--cyan)">/100</span></span>
            <span style="font-size:9px;font-weight:700;color:var(--ggreen);letter-spacing:.5px">${esc.faixa.nome.toUpperCase()}</span>
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;margin-top:6px;font-size:9px;color:var(--cyan)">${lblMeses}</div>
  </div>`;
}

// ===== Quadro dedicado: comparação de escores (hoje vs 6º mês) =====
function cardEscoresGrafico(){
  const esc=calcularEscore(projecao(), state.renda, state.metaPct);
  const pred=calcularEscorePreditivo(state.renda, state.metaPct);
  const escHoje=esc.score;
  const escPred=pred.indisponivel?null:pred.score;
  const delta=escPred!=null?escPred-escHoje:0;
  const W=320,H=160;
  // escala com zoom na faixa 40-100
  const lo=40,hi=100;
  const y=s=>{ const f=Math.max(0,Math.min((s-lo)/(hi-lo),1)); return H-14 - f*(H-30); };
  const yH=y(escHoje), yP=escPred!=null?y(escPred):null;
  const faixaCor=s=>s>=85?"#00C49F":s>=65?"#3FD9BC":s>=40?"#E0922F":"#FF6584";
  // ondas decorativas de fundo (estética orgânica do gráfico principal), em azul e verde
  const onda=(base,amp,off,op,cor)=>{
    let d=`M0 ${base}`;
    for(let i=1;i<=8;i++){ const x=(i/8)*W; const yy=base+amp*Math.sin(i/1.5+off); const xc=x-(W/8)/2; d+=` Q ${xc} ${base+amp*Math.sin((i-0.5)/1.5+off)}, ${x} ${yy}`; }
    return `<path d="${d} L ${W} ${H} L 0 ${H} Z" fill="${cor}" opacity="${op}"/>`;
  };
  // linha curva suave de um escore + área sob ela
  const curva=(yv)=>{
    const wobble=2.2;
    let d=`M0 ${yv}`;
    for(let i=1;i<=6;i++){ const x=(i/6)*W; const yy=yv+wobble*Math.sin(i*1.3); const xc=x-(W/6)/2; d+=` Q ${xc} ${yv+wobble*Math.sin((i-0.5)*1.3)}, ${x} ${yy}`; }
    return d;
  };
  const cHoje=curva(yH);
  const areaHoje=`<path d="${cHoje} L ${W} ${H} L 0 ${H} Z" fill="url(#gEscHoje)"/><path d="${cHoje}" stroke="#00E0C0" stroke-width="2.5" fill="none" filter="url(#glowG)"/>`;
  const cPred=escPred!=null?curva(yP):null;
  const areaPred=escPred!=null?`<path d="${cPred} L ${W} ${H} L 0 ${H} Z" fill="url(#gEscPred)"/><path d="${cPred}" stroke="#3FA9FF" stroke-width="2.5" fill="none" filter="url(#glowB)"/>`:"";
  const camadas = (escPred!=null && escPred>=escHoje) ? areaHoje+areaPred : areaPred+areaHoje;
  // pontos brilhantes nas pontas
  const ptHoje=`<circle cx="${W-7}" cy="${yH.toFixed(1)}" r="5" fill="#00E0C0" filter="url(#glowG)"/><circle cx="${W-7}" cy="${yH.toFixed(1)}" r="2.4" fill="#fff"/>`;
  const ptPred=escPred!=null?`<circle cx="${W-7}" cy="${yP.toFixed(1)}" r="5" fill="#3FA9FF" filter="url(#glowB)"/><circle cx="${W-7}" cy="${yP.toFixed(1)}" r="2.4" fill="#fff"/>`:"";
  return `<div class="card" style="background:linear-gradient(165deg,#0E3D52 0%,#0A2540 60%,#06203A 100%);border:none;color:#fff;padding:16px 14px 14px;position:relative;overflow:hidden">
    <div style="font-size:15px;font-weight:800;margin-bottom:2px">Comparativo de escore</div>
    <div style="font-size:11px;color:var(--cyan);margin-bottom:12px">hoje vs. como estará daqui a 6 meses</div>
    <div style="position:relative">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="display:block;overflow:visible">
        <defs>
          <linearGradient id="gEscHoje" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00E0C0" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#00C49F" stop-opacity="0.04"/>
          </linearGradient>
          <linearGradient id="gEscPred" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3FA9FF" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#1E5FA8" stop-opacity="0.04"/>
          </linearGradient>
          <filter id="glowG" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="glowB" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        ${onda(H*0.62,7,0,0.20,"#0E6E66")}
        ${onda(H*0.70,6,2,0.22,"#0B4F6C")}
        ${onda(H*0.80,5,4,0.18,"#103A6B")}
        ${[50,60,70,80,90,100].map(v=>`<line x1="0" y1="${y(v).toFixed(1)}" x2="${W}" y2="${y(v).toFixed(1)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/><text x="2" y="${(y(v)-2).toFixed(1)}" fill="rgba(255,255,255,.3)" font-size="8">${v}</text>`).join("")}
        ${camadas}
        ${ptHoje}${ptPred}
      </svg>
    </div>
    <div style="display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:10.5px">
      <span style="display:flex;align-items:center;gap:5px;color:#00E0C0"><span style="width:12px;height:8px;border-radius:2px;background:linear-gradient(#00E0C0,rgba(0,224,192,.1))"></span>hoje</span>
      ${escPred!=null?`<span style="display:flex;align-items:center;gap:5px;color:#3FA9FF"><span style="width:12px;height:8px;border-radius:2px;background:linear-gradient(#3FA9FF,rgba(63,169,255,.1))"></span>6º mês</span>`:""}
    </div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <div style="flex:1;background:rgba(0,224,192,.1);border:1px solid rgba(0,224,192,.3);border-radius:12px;padding:10px 12px">
        <div style="font-size:10px;color:#00E0C0;font-weight:700">ESCORE HOJE</div>
        <div style="font-size:26px;font-weight:800;color:#fff;line-height:1.1">${escHoje}<span style="font-size:11px;color:var(--cyan)">/100</span></div>
        <div style="font-size:10px;font-weight:700;color:${faixaCor(escHoje)}">${esc.faixa.nome}</div>
      </div>
      <div style="flex:1;background:rgba(63,169,255,.1);border:1px solid rgba(63,169,255,.35);border-radius:12px;padding:10px 12px">
        <div style="font-size:10px;color:#3FA9FF;font-weight:700">EM 6 MESES</div>
        <div style="font-size:26px;font-weight:800;color:#fff;line-height:1.1">${escPred??"—"}${escPred!=null?`<span style="font-size:11px;color:var(--cyan)">/100</span>`:""}</div>
        <div style="font-size:10px;font-weight:700;color:${escPred!=null?faixaCor(escPred):"var(--cyan)"}">${escPred!=null?pred.faixa.nome:"aumente p/ 18m"}</div>
      </div>
    </div>
    ${escPred!=null?`<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;font-size:12px">
      ${delta>0?`<span style="color:var(--ggreen);font-weight:800">▲ +${delta} pontos</span><span style="color:var(--cyan)">sua trajetória melhora</span>`:delta<0?`<span style="color:#3FA9FF;font-weight:800">▼ ${delta} pontos</span><span style="color:var(--cyan)">atenção à trajetória</span>`:`<span style="color:var(--cyan)">trajetória estável</span>`}
    </div>
    <div style="font-size:10.5px;color:var(--cyan);text-align:center;margin-top:8px;line-height:1.4">${delta>0?`Mantendo o rumo, daqui a 6 meses você chega a ${escPred}. Gaste hoje como quem já está lá. 💪`:delta<0?`Sua trajetória cai para ${escPred} em 6 meses. Ajustar os gastos agora evita isso.`:`Seu comportamento se mantém estável nos próximos 6 meses.`}</div>`:`<div style="font-size:10.5px;color:var(--cyan);text-align:center;margin-top:10px">Mude o seletor para 18 meses para projetar o escore além do 6º mês.</div>`}
  </div>`;
}

function ytId(url){ const m=(url||"").match(/(?:youtu\.be\/|v=|shorts\/)([\w-]{11})/); return m?m[1]:null; }
function miniaturaIncentivo(inc){
  const yt=ytId(inc.link);
  if(yt) return `<img src="https://img.youtube.com/vi/${yt}/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover" alt="">`;
  if(inc.img) return `<img src="${inc.img}" style="width:100%;height:100%;object-fit:cover" alt="">`;
  const t=TEMA_INCENTIVO[inc.tema||"outro"]||TEMA_INCENTIVO.outro;
  return `<div style="width:100%;height:100%;background:linear-gradient(135deg,${t.g[0]},${t.g[1]});display:flex;align-items:center;justify-content:center;font-size:34px">${t.emoji}</div>`;
}
function cardIncentivos(){
  const list=(state.incentivos||[]).slice().sort((a,b)=>(a.data||"")<(b.data||"")?-1:1);
  const novo=`<button onclick="_g.novoIncentivo()" style="flex:none;width:130px;background:rgba(255,255,255,.06);border:1.5px dashed rgba(255,255,255,.3);border-radius:14px;color:#fff;padding:0;height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px">
    <span style="font-size:26px;color:var(--gpink)">＋</span><span style="font-size:12px;font-weight:700">Adicionar<br>evento</span></button>`;
  const cards=list.map(inc=>{
    const yt=ytId(inc.link), temLink=!!inc.link;
    return `<div style="flex:none;width:160px;border-radius:14px;overflow:hidden;background:#000;position:relative" onclick="_g.abrirIncentivo('${inc.id}')">
      <div style="width:100%;height:96px;position:relative">${miniaturaIncentivo(inc)}
        ${temLink?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span style="width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px">▶</span></div>`:""}
        ${inc.data?`<div style="position:absolute;top:6px;left:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:8px">${fmtDataCurta(inc.data)}</div>`:""}
      </div>
      <div style="padding:8px 10px 10px;background:linear-gradient(180deg,rgba(10,37,64,.0),#0A2540 60%)">
        <div style="font-size:12px;font-weight:700;color:#fff;line-height:1.25">${inc.titulo||"Evento"}</div>
        ${inc.valor?`<div style="font-size:11px;color:var(--ggreen);font-weight:700;margin-top:3px">meta ${fmt(inc.valor)}</div>`:""}
      </div>
    </div>`;
  }).join("");
  return `<div style="margin:4px 0 14px">
    <div style="font-size:15px;font-weight:800;color:#fff;margin-bottom:10px;padding:0 2px">Incentivos · seus próximos planos</div>
    <div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:4px">${cards}${novo}</div>
  </div>`;
}

  return `<svg width="46" height="40" viewBox="0 0 46 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="wl" x1="0" y1="0" x2="1" y2="1">

    <rect x="6" y="10" width="34" height="24" rx="5" fill="#000" opacity="0.08"/>
    <path d="M6 15c0-2.8 2.2-5 5-5h22l-4 6H6z" fill="#A78BFA" opacity="0.9"/>
    <rect x="26" y="18" width="16" height="10" rx="3" fill="#1E293B" opacity="0.85"/>
    <circle cx="33" cy="23" r="2.4" fill="#CBD5E1"/>
  </svg>`;

function svgGauge(frac){
  // arco semicircular de 0 a 1
  const a0=Math.PI, a1=Math.PI*(1-frac); // da esquerda (180º) subindo
  const cx=30,cy=30,r=24;
  const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
  const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
  const large=frac>0.5?1:0;
  const xe=cx+r*Math.cos(0), ye=cy+r*Math.sin(0);
  return `<svg width="60" height="34" viewBox="0 0 60 34" fill="none">
    <path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 0 1 ${xe.toFixed(1)} ${ye.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-width="5" stroke-linecap="round"/>
    <path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)}" stroke="#34D399" stroke-width="5" stroke-linecap="round"/>
  </svg>`;
}

      <button onclick="_g.perguntarLivre()" ${temIA?'':'disabled'} style="background:var(--gpink);border:none;color:#fff;font-weight:700;padding:0 16px;border-radius:10px;font-size:14px;${temIA?'':'opacity:.5'}">▸</button>

function bolha(html){ return `<div style="margin-top:12px;background:rgba(255,255,255,.95);color:var(--ink);border-radius:14px;padding:13px 14px;font-size:13.5px;line-height:1.5">${html}</div>`; }
G.perguntar=q=>{
  let html="";
  if(q==="cat"){
    const cats=Analise.porCategoria();
    const tot=cats.reduce((s,c)=>s+c.v,0)||1;
    html=`<b>Seus gastos por categoria neste mês:</b>${cats.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:7px"><span>${c.cat}</span><span style="font-weight:700">${fmt(c.v)} <span style="color:var(--mute);font-size:11px">${Math.round(c.v/tot*100)}%</span></span></div><div style="height:5px;border-radius:3px;background:#eee;margin-top:3px;overflow:hidden"><div style="width:${c.v/tot*100}%;height:100%;background:var(--emerald)"></div></div>`).join("")}`;
  } else if(q==="alim3"){
    const r=[...Analise.principaisProximos(3,"Restaurante"),...Analise.principaisProximos(3,"Mercado")].sort((a,b)=>b.total-a.total);
    const tot=r.reduce((s,x)=>s+x.total,0);
    html=`<b>Alimentação (restaurantes + mercado) nos próximos 3 meses:</b><div style="margin:6px 0;font-size:12px;color:var(--mute)">Total estimado: <b style="color:var(--emerald)">${fmt(tot)}</b></div>${r.slice(0,6).map(x=>`<div style="display:flex;justify-content:space-between;margin-top:5px"><span>${x.nome} <span style="color:var(--mute);font-size:11px">${x.cat}</span></span><span style="font-weight:700">${fmt(x.total)}</span></div>`).join("")}`;
  } else if(q==="parc"){
    const ev=Analise.evolucaoParcelas();
    const ini=ev[0].parcela, fim=ev[ev.length-1].parcela;
    const marcos=ev.filter((_,i)=>i%3===0||i===ev.length-1);
    html=`<b>Evolução do seu compromisso com parcelas:</b><div style="margin:6px 0;font-size:12.5px">Hoje: <b style="color:var(--gpink)">${fmt(ini)}/mês</b> → em ${ev.length} meses: <b style="color:var(--emerald)">${fmt(fim)}/mês</b></div>${marcos.map(m=>`<div style="display:flex;justify-content:space-between;margin-top:4px;font-size:12.5px"><span>${m.mes}/${String(m.ano).slice(2)}</span><span style="font-weight:700;color:var(--gpink)">${fmt(m.parcela)}</span></div>`).join("")}<div style="font-size:11.5px;color:var(--mute);margin-top:8px">💡 Cada parcelamento que termina libera espaço no orçamento.</div>`;
  } else if(q==="antec"){
    const parcelas=state.itens.filter(i=>i.natureza==="parcela").sort((a,b)=>(b.valor*b.restam)-(a.valor*a.restam)).slice(0,6);
    html=`<b>Qual parcelamento você quer simular antecipar?</b><div style="font-size:12px;color:var(--mute);margin:4px 0 8px">Escolha um (mostro o desembolso e o alívio):</div>${parcelas.map(it=>`<button onclick="_g.simAntec('${it.id}')" style="display:flex;justify-content:space-between;width:100%;background:#F4F7F9;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-top:6px;font-size:13px"><span>${it.nome}</span><span style="font-weight:700;color:var(--gpink)">${it.restam}x de ${fmt(it.valor)}</span></button>`).join("")}`;
  }
  respostaAgente=bolha(html);
  const el=document.getElementById("agResp"); if(el) el.innerHTML=respostaAgente;
};
G.simAntec=id=>{
  const it=state.itens.find(x=>x.id===id);
  const opcoes=[3,6,10].filter(k=>k<=it.restam);
  if(!opcoes.includes(it.restam)) opcoes.push(it.restam);
  const linhas=opcoes.map(k=>{
    const s=Analise.anteciparParcela(id,k);
    return `<div style="border-top:1px solid var(--line);padding:9px 0"><div style="display:flex;justify-content:space-between"><span style="font-weight:700">Antecipar ${s.kReal}x ${s.kReal===it.restam?'(quitar)':''}</span><span style="font-weight:800;color:var(--gpink)">paga ${fmt(s.desembolsoAgora)} agora</span></div><div style="font-size:12px;color:var(--mute);margin-top:3px">restam ${s.restam} → ${s.novoRestam} parcelas · alivia ${fmt(s.valor)}/mês por ${s.mesesAliviados} ${s.mesesAliviados===1?'mês':'meses'}</div></div>`;
  }).join("");
  const html=`<b>Antecipar parcelas — ${it.nome}</b><div style="font-size:12px;color:var(--mute);margin:4px 0">Atual: ${it.restam}x de ${fmt(it.valor)} (faltam ${fmt(it.valor*it.restam)})</div>${linhas}<div style="font-size:11.5px;color:var(--mute);margin-top:8px">💡 Como esses parcelamentos do cartão são sem juros, antecipar não gera economia de juros — mas libera limite e tira o compromisso da frente. Avalie se o dinheiro à vista rende mais do que esse alívio.</div>`;
  respostaAgente=bolha(html);
  const el=document.getElementById("agResp"); if(el) el.innerHTML=respostaAgente;
};
G.perguntarLivre=async()=>{
  const inp=document.getElementById("agInput"); const pergunta=(inp&&inp.value||"").trim();
  if(!pergunta) return;
  if(!cfg.funcaoUrl){ respostaAgente=bolha("Para perguntas livres, ative a IA em ⚙️ Configurar."); document.getElementById("agResp").innerHTML=respostaAgente; return; }
  respostaAgente=bolha("<span style='color:var(--mute)'>analisando seus dados…</span>");
  document.getElementById("agResp").innerHTML=respostaAgente;
  try{
    const r=await fetch(cfg.funcaoUrl,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({pergunta, dados:Analise.resumoParaIA()})});
    const d=await r.json();
    const txt=d.resposta||d.texto||JSON.stringify(d);
    respostaAgente=bolha(txt.replace(/\n/g,"<br>"));
  }catch(e){ respostaAgente=bolha("Não consegui consultar a IA agora. Tente as perguntas rápidas acima."); }
  document.getElementById("agResp").innerHTML=respostaAgente;
};

// ---------- Projeção ----------
function viewProj(){
  const p=projecao(), maxV=Math.max(...p.map(x=>Math.max(x.total,state.renda)),1);
  const estouro=p.filter(x=>x.total>state.renda).length, atencao=p.filter(x=>x.total>x.ideal).length;
  const aviso=estouro>0?`🛑 ${estouro} ${estouro===1?'mês ultrapassa':'meses ultrapassam'} a renda`
    :atencao>0?`${atencao} ${atencao===1?'mês fica':'meses ficam'} acima do ideal`:"todos os meses dentro do ideal 👏";
  const barras=p.map((x,bi)=>{
    const h=(x.total/maxV)*130, idealY=(x.ideal/maxV)*130, over=x.total>state.renda, tt=Math.max(x.total,1);
    const seg=(val,col,op=1)=>val>0?`<div style="height:${(val/tt)*100}%;background:${col};opacity:${op}"></div>`:"";
    return `<div onclick="_g.verMes(${bi})" style="min-width:${state.horizonte===18?15:22}px;flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer">
      <div style="width:100%;height:130px;position:relative;display:flex;align-items:flex-end">
        <div style="position:absolute;bottom:${idealY}px;left:0;right:0;height:1px;background:var(--green);opacity:.45"></div>
        <div style="width:100%;height:${h}px;border-radius:4px 4px 0 0;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end">
          ${seg(x.parcela,"var(--guava)",.9)}${seg(x.eventual,"var(--blue)",.8)}${seg(x.estimado,"var(--green)",.55)}${seg(x.fixo,over?"#1E293B":"var(--graphite)")}
        </div>
      </div>
      <div style="font-size:8.5px;color:var(--mute);margin-top:3px">${x.mes}</div>
    </div>`;
  }).join("");
  const linhas=p.map((x,i)=>`<tr onclick="_g.verMes(${i})" style="background:${i%2?'var(--bg)':'#fff'};border-bottom:1px solid var(--line);cursor:pointer">
    <td style="padding:10px 12px;font-size:13px;font-weight:600">${x.mes}/${String(x.ano).slice(2)} <span style="color:var(--cyan);font-size:11px">›</span></td>
    <td style="padding:10px 12px;font-size:13px;text-align:right;color:${x.total>state.renda?'var(--guava)':x.total>x.ideal?'var(--graphite)':'var(--ink)'}">${fmt(x.total)}</td>
    <td style="padding:10px 12px;font-size:13px;text-align:right;color:var(--mute)">${fmt(x.ideal)}</td>
    <td style="padding:10px 12px;font-size:13px;text-align:right;font-weight:700;color:${x.sobra>=0?'var(--green)':'var(--guava)'}">${x.sobra>=0?'+':''}${fmt(x.sobra)}</td></tr>`).join("");
  const leg=[["Fixas","var(--graphite)"],["Estimadas","var(--green)"],["Eventuais","var(--blue)"],["Parcelas","var(--guava)"]]
    .map(([l,c])=>`<span style="font-size:11px;color:var(--mute);display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:${c}"></span>${l}</span>`).join("");
  return `<div style="padding-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2>Projeção</h2>
      <div class="toggle">
        <button class="${state.horizonte===12?'on':''}" onclick="_g.setHor(12)">12m</button>
        <button class="${state.horizonte===18?'on':''}" onclick="_g.setHor(18)">18m</button>
      </div>
    </div>
    <div style="font-size:13px;color:${estouro?'var(--guava)':'var(--mute)'};margin-bottom:10px">${aviso}</div>
    <div class="card">
      <div style="display:flex;align-items:flex-end;gap:3px;height:150px;padding-top:6px;overflow-x:auto">${barras}</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap">${leg}</div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr style="background:var(--graphite);color:#fff;font-size:11px;font-weight:700">
        <td style="padding:10px 12px">Mês</td><td style="padding:10px 12px;text-align:right">Gasto</td>
        <td style="padding:10px 12px;text-align:right">Ideal</td><td style="padding:10px 12px;text-align:right">Saldo</td>
      </tr></thead><tbody>${linhas}</tbody></table>
    </div>
  </div>`;
}

// ---------- Detalhe de um mês ----------
function viewDetalheMes(){
  const i=mesDetalhe||0;
  const p=projecao(), x=p[i]; if(!x) return viewProj();
  const itens=itensDoMes(i);
  const grupos={ordinaria:[],estimada:[],eventual:[],parcela:[]};
  itens.forEach(it=>grupos[it.natureza].push(it));
  const sec=(nat,titulo,total)=>{
    const arr=grupos[nat]; if(!arr.length) return "";
    const linhas=arr.map(it=>{
      const extra=it.natureza==="parcela"?` · parcela ${it._parcelaNum}/${it._totalParc}`:
        it.natureza==="estimada"?` · ${fmt(+it.min||0)}–${fmt(+it.max||0)}`:"";
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)">
        <div style="min-width:0"><div style="font-size:13.5px;font-weight:600">${it.nome}</div>
        <div style="font-size:11px;color:var(--mute)">${it.cat}${extra}</div></div>
        <div style="font-weight:700;font-size:13.5px;color:${NAT_COR[nat]}">${fmt(it._v)}</div></div>`;
    }).join("");
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <span style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700"><span style="width:9px;height:9px;border-radius:3px;background:${NAT_COR[nat]}"></span>${titulo}</span>
      <span style="font-weight:800;color:${NAT_COR[nat]}">${fmt(total)}</span></div>${linhas}</div>`;
  };
  const over=x.total>state.renda;
  return `<div style="padding-top:10px">
    <button onclick="_g.voltarProj()" style="background:none;border:none;color:var(--cyan);font-size:14px;font-weight:700;padding:6px 0;display:flex;align-items:center;gap:5px">‹ voltar à projeção</button>
    <div class="card" style="background:var(--grad-dash);border:none;color:#fff">
      <div style="font-size:12px;color:var(--cyan);font-weight:700">${i===0?'ESTE MÊS':'DAQUI A '+i+(i===1?' MÊS':' MESES')}</div>
      <div style="font-size:24px;font-weight:800;margin:2px 0 10px">${x.mes}/${x.ano}</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <div><div style="font-size:10.5px;color:var(--cyan)">Renda do mês</div><div style="font-size:18px;font-weight:800;color:#fff">${fmt(x.rendaMes)}${x.extra>0?` <span style="font-size:11px;color:var(--ggreen)">+${fmt(x.extra)}</span>`:""}</div></div>
        <div><div style="font-size:10.5px;color:var(--cyan)">Gasto previsto</div><div style="font-size:18px;font-weight:800;color:${over?'var(--gpink)':'#fff'}">${fmt(x.total)}</div></div>
        <div><div style="font-size:10.5px;color:var(--cyan)">Saldo do mês</div><div style="font-size:18px;font-weight:800;color:${x.sobra>=0?'var(--ggreen)':'var(--gpink)'}">${x.sobra>=0?'+':''}${fmt(x.sobra)}</div></div>

function itemCard(it){

  const sub=`${it.cat} · ${NAT_LABEL[it.natureza]}`

    +(it.natureza==="eventual"?` · ${MESES[(new Date().getMonth()+(+it.mesIdx||0))%12]}`:"")

        <div style="display:flex;gap:14px;justify-content:flex-end;margin-top:6px">

G.editar=id=>{
  const box=document.getElementById("ed-"+id);
  if(!box) return;
  if(!box.classList.contains("hidden")){ box.classList.add("hidden"); editandoId=null; return; }
  editandoId=id;
  box.classList.remove("hidden");
  renderEdicao(id);
};
function renderEdicao(id){
  const it=state.itens.find(x=>x.id===id), box=document.getElementById("ed-"+id);
  if(!it||!box) return;
  const campo=(lb,key,val,type="text")=>`<label class="fld">${lb}<input class="inp" type="${type}" ${type==='number'?'inputmode="numeric"':''} value="${escapeAttr(val)}" oninput="_g.campo('${id}','${key}',this.value,${type==='number'})"></label>`;
  // seletor de natureza (reclassificação)
  const natBtn=nat=>`<button onclick="_g.setNatItem('${id}','${nat}')" style="flex:1;padding:8px 0;border-radius:9px;border:1.5px solid ${it.natureza===nat?NAT_COR[nat]:'var(--line)'};background:${it.natureza===nat?NAT_COR[nat]:'#fff'};color:${it.natureza===nat?'#fff':'var(--mute)'};font-size:11px;font-weight:700">${NAT_LABEL[nat].split(" ")[0]}</button>`;
  let html=`<label class="fld" style="margin-bottom:2px">Tipo de despesa</label>
    <div style="display:flex;gap:5px;margin-bottom:10px">${["ordinaria","estimada","eventual","parcela"].map(natBtn).join("")}</div>`;
  html+=campo("Nome","nome",it.nome);
  if(it.natureza==="estimada") html+=`<div style="display:flex;gap:8px">${campo("Mínimo (R$)","min",it.min,"number")}${campo("Máximo (R$)","max",it.max,"number")}</div>`;
  else html+=campo(it.natureza==="parcela"?"Valor da parcela (R$)":(it.natureza==="ordinaria"?"Valor mensal (R$)":"Valor (R$)"),"valor",it.valor,"number");
  if(it.natureza==="parcela") html+=campo("Parcelas restantes","restam",it.restam,"number");
  if(it.natureza==="eventual") html+=campo("Daqui a quantos meses (0=este)","mesIdx",it.mesIdx||0,"number");
  html+=`<label class="fld">Categoria<select class="inp" onchange="_g.campo('${id}','cat',this.value,false)">${CATEGORIAS.map(c=>`<option ${c===it.cat?'selected':''}>${c}</option>`).join("")}</select></label>`;
  box.innerHTML=`<div>${html}</div><button class="btnG" style="margin-top:12px;width:100%" onclick="_g.editar('${id}')">fechar edição</button>`;
}
// reclassifica a natureza de um item já existente, preenchendo defaults
G.setNatItem=(id,nat)=>{
  const it=state.itens.find(x=>x.id===id); if(!it||it.natureza===nat) return;
  const base=+it.valor || (it.min!=null?Math.round((+it.min+ +it.max)/2):0);
  const patch={natureza:nat};
  if(nat==="estimada"){ patch.min=it.min!=null?it.min:(base?Math.round(base*0.8):0); patch.max=it.max!=null?it.max:(base?Math.round(base*1.2):0); patch.valor=undefined; patch.restam=undefined; patch.total=undefined; patch.mesIdx=undefined; }
  else if(nat==="parcela"){ patch.valor=base||0; patch.restam=it.restam!=null?it.restam:2; patch.total=(base||0)*(it.restam!=null?it.restam:2); patch.min=undefined; patch.max=undefined; patch.mesIdx=undefined; }
  else if(nat==="eventual"){ patch.valor=base||0; patch.mesIdx=it.mesIdx!=null?it.mesIdx:0; patch.min=undefined; patch.max=undefined; patch.restam=undefined; patch.total=undefined; }
  else { patch.valor=base||0; patch.min=undefined; patch.max=undefined; patch.restam=undefined; patch.total=undefined; patch.mesIdx=undefined; }
  // aplica removendo chaves indefinidas
  state.itens=state.itens.map(x=>{ if(x.id!==id) return x; const novo={...x,...patch}; Object.keys(novo).forEach(k=>novo[k]===undefined&&delete novo[k]); return novo; });
  salvar();
  editandoId=id;
  render(); // re-renderiza a lista (atualiza valor/subtítulo do card) e reabre a edição
};
G.campo=(id,key,val,num)=>{
  const patch={[key]:num?(val===""?0:Number(val)):val};
  if(key==="valor"||key==="restam"){
    const it=state.itens.find(x=>x.id===id);
    if(it&&it.natureza==="parcela"){ const valor=key==="valor"?Number(val)||0:(+it.valor||0); const restam=key==="restam"?Number(val)||0:(+it.restam||0); patch.total=valor*restam; }
  }
  atualizar(id,patch);
};
G.quitarParcela=id=>quitarParcela(id);
G.togglePago=id=>togglePago(id);
G.fecharMes=()=>fecharMes();
G.excluir=id=>excluir(id);

function viewMetas(){
  const p=projecao(), m=p[0];
  const disponivel=state.renda-m.total, guardadoAlvo=state.renda*state.metaPct;
  const fechaMeta=disponivel>=guardadoAlvo, ajuste=guardadoAlvo-disponivel;
  const botoes=[0.01,0.05,0.10,0.15,0.20,0.30].map(x=>{
    const on=Math.abs(state.metaPct-x)<0.001;
    return `<button onclick="_g.setMeta(${x})" style="padding:13px 0;border-radius:11px;border:1.5px solid ${on?'var(--green)':'var(--line)'};background:${on?'var(--green)':'#fff'};color:${on?'#fff':'var(--ink)'};font-weight:700;font-size:15px">${(x*100).toFixed(0)}%</button>`;
  }).join("");
  const row=(l,v,bold,cor)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;font-weight:${bold?800:400}"><span>${l}</span><span style="color:${cor||'var(--ink)'}">${fmt(v)}</span></div>`;
  const plano=fechaMeta
    ? `<li>Programe transferência de ${fmt(guardadoAlvo)} no dia seguinte ao salário.</li><li>Cada parcela que terminar, redirecione pra reserva.</li><li>Monte 3–6 meses de despesa antes da renda variável.</li>`
    : `<li>Faltam <b>${fmt(ajuste)}</b>/mês. Reduza as estimadas para o piso da faixa.</li><li>Não abra novos parcelamentos (${fmt(m.parcela)}/mês ativos).</li><li>Antecipe eventuais guardando 1/12 por mês.</li>`;
  return `<div style="padding-top:16px"><h2 style="margin-bottom:12px">Metas & gasto ideal</h2>
    <div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Quanto guardar por mês?</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${botoes}</div>
      <div style="margin-top:12px;text-align:center;font-size:14px">meta: <b style="color:var(--green)">${fmt(guardadoAlvo)}</b>/mês</div></div>
    <div class="card">
      ${row("Renda mensal",state.renda,true,"var(--blue)")}${row("Ordinárias",-m.fixo)}${row("Estimadas (provável)",-m.estimado)}${row("Eventuais do mês",-m.eventual)}${row("Parcelas",-m.parcela,false,"var(--guava)")}
      <div style="border-top:1.5px solid var(--line);margin:8px 0"></div>
      ${row("Disponível",disponivel,true,disponivel>=0?"var(--green)":"var(--guava)")}</div>
    <div class="card" style="background:${fechaMeta?'var(--greenSoft)':'var(--guavaSoft)'};border:1px solid ${fechaMeta?'#BFE0D2':'#F6D2CD'}">
      <div style="font-size:13px;font-weight:700;color:${fechaMeta?'var(--green)':'var(--guava)'};margin-bottom:6px">${fechaMeta?'🎯 Você fecha a meta':'🛠️ Plano para fechar a meta'}</div>
      <ul style="margin:0;padding-left:18px;font-size:13px;line-height:1.7">${plano}</ul></div>
    ${cardHistorico()}
  </div>`;
}
function cardHistorico(){
  const h=(state.historico||[]).filter(x=>x.fechado);
  if(!h.length) return `<div class="card" style="text-align:center;color:var(--mute);font-size:12.5px;padding:18px">
    📅 Nenhum mês fechado ainda. Em <b>Despesas</b>, marque o que pagou e toque em <b>Fechar mês</b> para começar seu histórico — o escore passará a refletir seu comportamento real.</div>`;
  const linhas=h.slice().reverse().map(x=>{
    const ad=x.previsto>0?Math.round((x.pago/x.previsto)*100):0;
    const cor=x.pago>x.renda?"var(--guava)":x.pago>=x.previsto*0.9?"var(--green)":"var(--amber,#E0922F)";
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)">
      <div><div style="font-weight:700;font-size:13.5px">${x.ym}</div><div style="font-size:11px;color:var(--mute)">previsto ${fmt(x.previsto)}</div></div>
      <div style="text-align:right"><div style="font-weight:800;font-size:14px;color:${cor}">${fmt(x.pago)}</div><div style="font-size:11px;color:var(--mute)">${ad}% do previsto</div></div>
    </div>`;
  }).join("");
  return `<div class="card">
    <div style="font-size:12.5px;font-weight:700;color:var(--graphite);margin-bottom:8px">📅 Histórico de meses fechados</div>
    ${linhas}

  </div>`;
}

function onArquivo(e){

  const isPdf=file.type==="application/pdf";
  const r=new FileReader();
  r.onload=()=>{ const b64=r.result.split(",")[1]; interpretar(isPdf?{pdfBase64:b64}:{imagemBase64:b64,imagemTipo:file.type||"image/jpeg"}); };

}

// ---- interpretação: usa a função de IA se houver; senão, parser local ----
async function interpretar(payload){
  if(payload.texto && !cfg.funcaoUrl){
    const itens=parseLocal(payload.texto);
    if(itens.length){ mostrarResultado(itens); status("",false); }
    else status("No modo simples, escreva como nos exemplos: \"luz entre 300 e 500\", \"IPVA 2400 em março\", \"sofá em 8x de 300\". Para texto livre/foto/PDF, ative a IA em ⚙️.",true);
    return;
  }
  if((payload.imagemBase64||payload.pdfBase64) && !cfg.funcaoUrl){
    status("Configure a IA em ⚙️ para ler foto/PDF.",true); return;
  }
  status("🤖 lendo seus gastos…",false);
  const res=document.getElementById("addResult"); if(res) res.innerHTML="";
  try{
    const r=await fetch(cfg.funcaoUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const data=await r.json();
    if(!r.ok) throw new Error(data.erro||"falha");
    if(!data.itens||!data.itens.length) throw new Error("nada encontrado");
    status("",false); mostrarResultado(data.itens);
  }catch(e){
    status("Não consegui interpretar. Tente algo simples como \"luz entre 300 e 500\" ou \"TV em 10x de 280\". (Se acabou de configurar a IA, confira a URL em ⚙️.)",true);
  }
}

// parser local simples (sem IA) — cobre os formatos dos exemplos
function parseLocal(texto){
  const out=[];
  const partes=segmentar(texto);
  for(const parte of partes){
    const low=parte.toLowerCase();
    let m;
    // parcelamento: "8x de 300" / "10x 280" / "parcelei em 8 vezes de 300"
    if((m=low.match(/(\d+)\s*(?:x|vezes?)\s*(?:de\s*)?(\d[\d.,]*)/))){
      const restam=parseInt(m[1],10), valor=num(m[2]);
      out.push({nome:limpaNome(parte)||"Parcelamento",cat:catGuess(low),natureza:"parcela",valor,restam,total:valor*restam});
      continue;
    }
    // estimada: "entre 300 e 500" / "de 300 a 500"
    if((m=low.match(/(?:entre|de)\s*(\d[\d.,]*)\s*(?:e|a|até)\s*(\d[\d.,]*)/))){
      out.push({nome:limpaNome(parte)||"Despesa estimada",cat:catGuess(low),natureza:"estimada",min:num(m[1]),max:num(m[2])});
      continue;
    }
    // eventual com mês: "IPVA 2400 em março"
    if((m=low.match(/(\d[\d.,]*)\s*(?:reais)?\s*(?:em|no|na)\s+([a-zç]+)/))){
      const mesIdx=mesParaIdx(m[2]);
      if(mesIdx!=null){ out.push({nome:limpaNome(parte)||"Despesa",cat:catGuess(low),natureza:"eventual",valor:num(m[1]),mesIdx}); continue; }
    }
    // valor simples → estimada se for conta variável, senão eventual (compra avulsa)
    if((m=low.match(/(\d[\d.,]+|\d+)/))){
      const v=num(m[1]);
      const recorrente=/assinatura|mensalidade|aluguel|condom|plano|escola|netflix|spotify|seguro|internet|telefon/.test(low);
      const nat=recorrente?"ordinaria":"eventual";
      const item={nome:limpaNome(parte)||"Despesa",cat:catGuess(low),natureza:nat,valor:v};
      if(nat==="eventual") item.mesIdx=0;
      out.push(item);
    }
  }
  return out;
}
// segmenta uma fala em despesas distintas, protegendo "entre X e Y" e "Nx de Y"
function segmentar(texto){
  let t=texto;
  // protege "entre X e Y" e "de X a Y" trocando o conector por placeholder
  t=t.replace(/(entre\s*\d[\d.,]*)\s*(e|a|até)\s*(\d[\d.,]*)/gi,"$1<E>$3");
  t=t.replace(/(\d+\s*(?:x|vezes?))\s*(de)\s*(\d)/gi,"$1<DE>$3");
  // separadores de itens: ; / quebra de linha / vírgula / " e " / "também" / "mais"
  let partes=t.split(/[;\n]+|,| e | também | tambem | mais /i);
  // restaura placeholders
  return partes.map(s=>s.replace(/<E>/g," e ").replace(/<DE>/g," de ").trim()).filter(Boolean);
}
function num(s){ s=String(s).replace(/\./g,"").replace(",","."); const n=parseFloat(s); return isNaN(n)?0:n; }
function limpaNome(s){
  let t=s
    .replace(/r\$\s*/gi,"")
    .replace(/\d+\s*x\s*(?:de\s*)?\d[\d.,]*/gi,"")   // "8x de 300"
    .replace(/entre\s*\d[\d.,]*\s*e\s*\d[\d.,]*/gi,"") // "entre 300 e 500"
    .replace(/\bem\s+(janeiro|fevereiro|março|marco|abril|maio|junho|julho|agosto|setembro|outubro|novembro|dezembro)\b/gi,"")
    .replace(/\d[\d.,]*/g,"")                          // números soltos
    .replace(/\breais\b/gi,"")
    .replace(/\s+/g," ").replace(/[\s,;:-]+$/,"")
    .replace(/\s+(em|de|da|do|na|no|para|pra|por)$/i,"").trim();
  return t.replace(/^./,c=>c.toUpperCase());
}
function catGuess(s){
  if(/luz|energia|água|agua|conta|internet|telefone/.test(s)) return "Contas";
  if(/mercado|supermerc|feira/.test(s)) return "Mercado";
  if(/ipva|iptu|imposto/.test(s)) return "Impostos";
  if(/restaurante|delivery|ifood|lanche/.test(s)) return "Restaurante";
  if(/gasolina|combust|uber|transporte|ônibus|onibus/.test(s)) return "Transporte";
  if(/escola|curso|faculdade/.test(s)) return "Educação";
  if(/médico|medico|remédio|remedio|saúde|saude|plano/.test(s)) return "Saúde";
  if(/aluguel|financ|condom/.test(s)) return "Moradia";
  return "Outros";
}
function mesParaIdx(palavra){
  const map={janeiro:0,fevereiro:1,março:2,marco:2,abril:3,maio:4,junho:5,julho:6,agosto:7,setembro:8,outubro:9,novembro:10,dezembro:11};
  const alvo=map[palavra]; if(alvo==null) return null;
  const atual=new Date().getMonth();
  return (alvo-atual+12)%12;
}

function mostrarResultado(itens){
  resultadoTmp=itens;

  const linhas=itens.map((it,i)=>{
    const nat=it.natureza||"eventual";
    // campos específicos por natureza
    let campos="";
    if(nat==="estimada"){
      campos=`<div style="display:flex;gap:6px;margin-top:6px">
        ${campoMini(i,"min","Mín R$",it.min)}${campoMini(i,"max","Máx R$",it.max)}</div>`;
    } else if(nat==="parcela"){
      campos=`<div style="display:flex;gap:6px;margin-top:6px">
        ${campoMini(i,"valor","Parcela R$",it.valor)}${campoMini(i,"restam","Faltam Nx",it.restam)}</div>`;
    } else if(nat==="eventual"){
      campos=`<div style="display:flex;gap:6px;margin-top:6px">
        ${campoMini(i,"valor","Valor R$",it.valor)}${campoMini(i,"mesIdx","Daqui a (meses)",it.mesIdx||0)}</div>`;
    } else { // ordinaria
      campos=`<div style="display:flex;gap:6px;margin-top:6px">
        ${campoMini(i,"valor","Valor mensal R$",it.valor)}</div>`;
    }
    return `<div style="padding:12px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <input value="${escapeAttr(it.nome||'Despesa')}" oninput="_g.setNome(${i},this.value)" style="flex:1;min-width:0;border:1.5px solid var(--line);border-radius:8px;padding:8px;font-size:14px;font-weight:600">
        <button class="btnP" style="padding:9px 14px;font-size:13px;min-height:auto;flex:none" onclick="_g.incluir(${i})">incluir</button>
      </div>
      <div style="display:flex;gap:5px;margin-top:8px">${["ordinaria","estimada","eventual","parcela"].map(n=>natBtn(i,n,nat)).join("")}</div>
      ${campos}
      <select onchange="_g.setCat(${i},this.value)" style="width:100%;border:1.5px solid var(--line);border-radius:8px;padding:8px;font-size:13px;margin-top:6px">${CATEGORIAS.map(c=>`<option ${c===(it.cat||'Outros')?'selected':''}>${c}</option>`).join("")}</select>
    </div>`;
  }).join("");
  const res=document.getElementById("addResult"); if(!res) return;
  res.innerHTML=`<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:6px">${itens.length} ${itens.length===1?'lançamento encontrado':'lançamentos encontrados'} — ajuste o tipo e inclua:</div>${linhas}
    <button class="btnG" style="width:100%;margin-top:12px" onclick="_g.incluirTodos()">incluir todos</button></div>`;
}
function campoMini(i,key,label,val){
  return `<label style="flex:1;font-size:10px;color:var(--mute)">${label}<input type="number" inputmode="numeric" value="${val!=null?val:''}" oninput="_g.setCampo(${i},'${key}',this.value)" style="width:100%;border:1.5px solid var(--line);border-radius:8px;padding:7px;font-size:13px;margin-top:2px"></label>`;
}
G.setNat=(i,nat)=>{ if(!resultadoTmp||!resultadoTmp[i])return; const it=resultadoTmp[i]; it.natureza=nat;
  // defaults sensatos ao trocar de tipo
  if(nat==="estimada"){ if(it.min==null){ const base=+it.valor||0; it.min=base?Math.round(base*0.8):0; it.max=base?Math.round(base*1.2):0; } }
  if(nat==="parcela"){ if(it.restam==null) it.restam=2; if(it.valor==null) it.valor=0; }
  if(nat==="eventual"){ if(it.mesIdx==null) it.mesIdx=0; }
  mostrarResultado(resultadoTmp); };
G.setNome=(i,v)=>{ if(resultadoTmp&&resultadoTmp[i]) resultadoTmp[i].nome=v; };
G.setCat=(i,v)=>{ if(resultadoTmp&&resultadoTmp[i]) resultadoTmp[i].cat=v; };
G.setCampo=(i,key,v)=>{ if(resultadoTmp&&resultadoTmp[i]) resultadoTmp[i][key]=v===""?null:Number(v); };
G.incluir=i=>{ const it=resultadoTmp&&resultadoTmp[i]; if(!it) return; lancar(normaliza(it)); resultadoTmp.splice(i,1); if(resultadoTmp.length) mostrarResultado(resultadoTmp); else { document.getElementById("addResult").innerHTML=""; status("Incluído ✓ — veja em Despesas.",false); } };
G.incluirTodos=()=>{ if(!resultadoTmp) return; resultadoTmp.forEach(it=>lancar(normaliza(it))); resultadoTmp=null; document.getElementById("addResult").innerHTML=""; status("Tudo incluído ✓",false); };
function normaliza(it){
  const base={nome:it.nome||"Despesa",cat:it.cat||"Outros",natureza:it.natureza||"eventual"};
  if(it.natureza==="estimada") return {...base,min:Number(it.min)||0,max:Number(it.max)||0};
  if(it.natureza==="parcela"){ const valor=Number(it.valor)||0, restam=Number(it.restam)||1; return {...base,valor,restam,total:valor*restam}; }
  if(it.natureza==="eventual") return {...base,valor:Number(it.valor)||0,mesIdx:Number(it.mesIdx)||0};
  return {...base,valor:Number(it.valor)||0};
}

      <input id="cfgFn" class="inp" inputmode="url" placeholder="https://southamerica-east1-...cloudfunctions.net/interpretarDespesa" value="${escapeAttr(cfg.funcaoUrl)}">
      <button id="salvarFn" class="btnP" style="width:100%;margin-top:10px">Salvar URL</button>
    </div>

function ligarConfig(){
  document.getElementById("salvarFb").onclick=()=>{
    let raw=(document.getElementById("cfgFb").value||"").trim();
    if(!raw){ cfg.firebase=null; salvarCfg(); banner("Firebase removido."); render(); return; }
    // tenta extrair só o objeto { ... }, aceitando o formato JS que o Firebase fornece
    try{
      // 1) remove "const firebaseConfig =" e ponto-e-vírgula final, se houver
      raw=raw.replace(/^\s*(?:const|let|var)\s+\w+\s*=\s*/,"").replace(/;?\s*$/,"");
      // 2) isola do primeiro { ao último } (ignora texto solto antes/depois)
      const a=raw.indexOf("{"), b=raw.lastIndexOf("}");
      if(a>=0 && b>a) raw=raw.slice(a,b+1);
      let obj;
      try{ obj=JSON.parse(raw); }
      catch{
        // 3) formato JS: chaves sem aspas e/ou aspas simples → normaliza para JSON
        let s=raw
          .replace(/([{,]\s*)([A-Za-z_$][\w$]*)\s*:/g,'$1"$2":') // chaves sem aspas → "chave":
          .replace(/'/g,'"')                                       // aspas simples → duplas
          .replace(/,(\s*[}\]])/g,'$1');                           // vírgula sobrando antes de }
        obj=JSON.parse(s);
      }
      if(!obj.apiKey||!obj.projectId){
        alert("Faltam campos no que você colou. O bloco precisa conter as linhas apiKey e projectId — cole o bloco COMPLETO, do apiKey até o final.");
        return;
      }
      cfg.firebase=obj; salvarCfg();
      alert("Firebase salvo. O app vai recarregar para conectar.");
      location.reload();
    }catch(e){ alert("Não consegui ler. Cole o bloco completo do Firebase, começando em apiKey e terminando em } — pode colar do jeito que o Firebase mostra."); }
  };
  document.getElementById("salvarFn").onclick=()=>{
    const u=(document.getElementById("cfgFn").value||"").trim();
    if(u && !/^https:\/\//.test(u)){ alert("A URL deve começar com https://"); return; }
    cfg.funcaoUrl=u; salvarCfg(); alert(u?"URL salva. Foto e PDF ativados.":"URL removida."); render();
  };
  document.getElementById("exportar").onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="guava-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click();
  };
  document.getElementById("importarBtn").onclick=()=>document.getElementById("importarInp").click();
  const btnSerie=document.getElementById("exportarSerie");
  if(btnSerie) btnSerie.onclick=()=>{
    const csv=exportarSerieCSV();
    if(!csv){ alert("Ainda não há retratos suficientes. Use o app por alguns dias para formar a série."); return; }
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download="guava-serie-"+new Date().toISOString().slice(0,10)+".csv"; a.click();
  };
  document.getElementById("importarInp").onchange=e=>{
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ try{ const obj=JSON.parse(r.result); state={...state,...obj}; salvar(); alert("Backup importado ✓"); render(); }catch{ alert("Arquivo inválido."); } };
    r.readAsText(f);
  };
  document.getElementById("resetar").onclick=()=>{
    if(!confirm("Apagar todas as despesas e recomeçar com os exemplos?")) return;
    state={renda:20000,metaPct:0.20,horizonte:12,itens:seed.slice(),receitas:[],historico:[],pagosMes:{},mesRef:"",incentivos:[],serieHistorica:[]}; salvar(); render();
  };
}

// ---------- renda ----------
document.getElementById("rendaBtn").onclick=()=>{
  const novo=prompt("Renda mensal (R$):",state.renda);
  if(novo!==null){ const n=Number(String(novo).replace(/[^\d]/g,"")); if(n>0){ state.renda=n; salvar(); render(); } }
};

carregarLocal();
registrarSnapshot();

iniciarFirebase();
