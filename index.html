<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1B5E3B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Guava" />
<title>Guava — gestão familiar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root{
    /* ===== Tema "Nubank light" (roxo suavizado + cartões brancos) ===== */
    --nu:#14804A; --nu-soft:#2FA56B;
    --navy:#2E1065; --cyan:#6C7FD8; --emerald:#0E8A6E; --ggreen:#00C49F;
    --gpink:#EB2A6F; --legend:#6B6676; --violet:#14804A; --indigo:#2FA56B;
    --bg:#F4F2F8; --card:#FFFFFF; --ink:#26233A; --mute:#6B6676;
    --line:#ECE8F4;
    --blue:#6C7FD8; --blueSoft:#EEF0FF; --green:#12A594; --greenSoft:#E6F7F2;
    --graphite:#2E1065; --graphiteSoft:#F1EDF8; --guava:#EB2A6F; --guavaSoft:#FFEAF0;
    --amber:#E0922F;
    --grad-dash:linear-gradient(160deg,#14532D 0%,#0F3D2E 55%,#0A2540 100%);
    --glass:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    background:linear-gradient(180deg,#F3FAF5 0%,#FDFEFD 30%,#F2F7FA 100%);
    background-attachment:fixed;color:var(--ink);font-family:'Inter',-apple-system,system-ui,sans-serif;
    padding-bottom:calc(80px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased;position:relative}
  header,main,nav,.saveTag{position:relative;z-index:1}
  button,input,select,textarea{font-family:inherit;font-size:16px}
  button{cursor:pointer}
  button:active{opacity:.85}
  main{max-width:600px;margin:0 auto;padding:0 14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:12px;
    animation:pop .25s ease both;box-shadow:0 3px 14px rgba(46,16,101,.06)}
  body.boot-done .card{animation:none}
  @keyframes pop{0%{transform:translateY(8px);opacity:0}100%{transform:none;opacity:1}}
  @keyframes slideIn{0%{transform:translateX(12px);opacity:0}100%{transform:none;opacity:1}}
  /* Mascote GuavAI — máquina de estados (o SVG fica dentro do .orbe) */
  @keyframes orbeIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4%)}}
  @keyframes orbeListen{0%,100%{transform:scale(1)}25%{transform:scale(1.06)}60%{transform:scale(.97)}}
  @keyframes orbeCompute{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  @keyframes orbeAlert{0%{transform:scale(1)}15%{transform:scale(.9) rotate(-3deg)}30%{transform:scale(1.03) rotate(3deg)}100%{transform:scale(1)}}
  @keyframes orbeRipple{0%{transform:scale(.6);opacity:.6}100%{transform:scale(2.2);opacity:0}}
  .orbe{position:relative;display:inline-flex;align-items:center;justify-content:center}
  .orbe svg{width:100%;height:100%;display:block}
  .orbe.idle{animation:orbeIdle 3s ease-in-out infinite}
  .orbe.listening{animation:orbeListen 1.1s ease-in-out infinite}
  .orbe.computing{animation:orbeCompute 1.6s ease-in-out infinite}
  .orbe.alert{animation:orbeAlert .9s ease-in-out infinite}
  .orbe .ripple{position:absolute;inset:6%;border-radius:50%;pointer-events:none}
  .orbe.alert .ripple{animation:orbeRipple 1.1s ease-out infinite;border:2px solid #FF6584}
  main.swap{animation:slideIn .22s ease both}
  @media(prefers-reduced-motion:reduce){.card,main.swap{animation:none}}
  h2{font-size:20px;font-weight:800;letter-spacing:-.3px;color:var(--ink)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btnP{background:linear-gradient(135deg,var(--nu-soft),var(--nu));color:#fff;border:none;border-radius:14px;padding:14px 18px;font-size:15px;font-weight:700;min-height:50px;box-shadow:0 6px 18px rgba(130,10,209,.28)}
  .btnG{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;font-size:15px;font-weight:700;min-height:50px;color:var(--ink)}
  .inp{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;margin-top:4px;background:#fff;color:var(--ink)}
  .inp::placeholder{color:#A79FBE}
  .pill{padding:9px 14px;border-radius:20px;white-space:nowrap;font-size:13px;font-weight:600;border:1.5px solid var(--line);background:#fff;color:var(--mute);min-height:38px}
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:50;box-shadow:0 -4px 22px rgba(46,16,101,.08)}
  nav button{flex:1;background:none;border:none;padding:9px 0 11px;color:var(--mute);min-width:0;transition:color .2s}
  nav button.on{color:var(--nu)}
  nav .ic{font-size:20px;line-height:1;transition:transform .2s}
  nav button.on .ic{transform:scale(1.15)}
  nav .lb{font-size:9.5px;font-weight:500;margin-top:3px}
  nav button.on .lb{font-weight:700}
  nav button.plus .ic{background:linear-gradient(135deg,var(--nu-soft),var(--nu));color:#fff;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:-12px auto 0;box-shadow:0 6px 18px rgba(130,10,209,.45);font-size:26px}
  nav button.plus.on .ic{transform:scale(1.05)}
  nav button.plus.on{color:var(--nu)}
  header{background:linear-gradient(165deg,#1B5E3B 0%,#14532D 100%);padding:12px 16px 4px;padding-top:calc(12px + env(safe-area-inset-top))}
  .hgrid{max-width:600px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  .barTrack{height:14px;border-radius:8px;background:var(--graphiteSoft);overflow:hidden;position:relative;margin-top:10px}
  .toggle{display:flex;background:var(--graphiteSoft);border-radius:12px;padding:3px}
  .toggle button{padding:9px 18px;border-radius:9px;border:none;font-size:14px;font-weight:700;background:transparent;color:var(--mute)}
  .toggle button.on{background:linear-gradient(135deg,var(--nu-soft),var(--nu));color:#fff}
  .hidden{display:none}
  .loadDot{text-align:center;color:var(--mute);font-size:14px;padding:16px}
  table{width:100%;border-collapse:collapse}
  .saveTag{position:fixed;top:calc(8px + env(safe-area-inset-top));right:12px;background:rgba(255,255,255,.92);color:var(--nu);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;z-index:60;opacity:0;transition:opacity .3s}
  .saveTag.show{opacity:.95}
  .banner{background:var(--guavaSoft);border:1px solid #F6C7D6;color:#B0234E;font-size:13px;padding:10px 12px;border-radius:10px;margin:12px 0;line-height:1.5}
  label.fld{display:block;font-size:12px;color:var(--mute);font-weight:600;margin-top:10px}
  /* ===== Gravação de voz estilo WhatsApp (chat GuavAI) ===== */
  @keyframes recDot{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes wave{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
  .recBar{display:flex;align-items:center;gap:10px;flex:1;min-width:0;background:rgba(255,255,255,.16);border-radius:22px;padding:9px 14px;color:#fff}
  .recDot{width:11px;height:11px;border-radius:50%;background:#FF7BA6;flex:none;animation:recDot 1s ease-in-out infinite}
  .recWave{display:flex;align-items:center;gap:2.5px;height:20px;flex:1;min-width:0;overflow:hidden}
  .recWave span{display:block;width:2.5px;border-radius:2px;background:#D9C6FF;height:100%;transform-origin:center;animation:wave .9s ease-in-out infinite}
  .recCancelHint{font-size:12px;color:rgba(255,255,255,.75);white-space:nowrap;display:flex;align-items:center;gap:4px}
  .micBtn{transition:transform .15s ease, background .15s ease}
  .micBtn.recording{transform:scale(1.25);background:var(--gpink)!important;box-shadow:0 0 0 6px rgba(235,42,111,.22)}
  .micBtn.cancel{background:#94A3B8!important;box-shadow:0 0 0 6px rgba(148,163,184,.25)}
</style>
</head>

async function iniciarFirebase(){
  if(!cfg.firebase) return;
  try{
    const [{initializeApp},{getFirestore,doc,getDoc,setDoc,onSnapshot},{getAuth,signInAnonymously,onAuthStateChanged}]=await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"),
    ]);
    fb.app=initializeApp(cfg.firebase);
    fb.db=getFirestore(fb.app);
    fb.auth=getAuth(fb.app);
    fb._api={doc,getDoc,setDoc,onSnapshot};
    onAuthStateChanged(fb.auth,async(user)=>{
      if(!user){ signInAnonymously(fb.auth).catch(e=>banner("Login Firebase falhou: "+e.message)); return; }
      fb.uid=user.uid;
      fb.ref=doc(fb.db,"usuarios",user.uid);
      const snap=await getDoc(fb.ref);
      if(snap.exists()){ state={...state,...snap.data()}; salvarLocal(); render(); }
      else { await gravarFirebase(); }
      if(fb.unsub) fb.unsub();
      // PATCH: ignora o "eco" de escritas locais pendentes (metadata.hasPendingWrites).
      // Antes, cada salvar() gerava um onSnapshot extra que refazia o render() inteiro
      // logo depois do usuário interagir — dobrando o "piscar" na tela.
      fb.unsub=onSnapshot(fb.ref,{includeMetadataChanges:true},d=>{
        if(d.metadata && d.metadata.hasPendingWrites) return;
        if(d.exists()){ state={...state,...d.data()}; salvarLocal(); render(); }
      });
    });
  }catch(e){ banner("Não consegui iniciar o Firebase. Verifique a configuração em ⚙️."); }
}

  if(!fb.ref||!fb._api) return;
  try{ await fb._api.setDoc(fb.ref,state,{merge:true}); }

}

// ---------- projeção ----------
function gastoDoMes(i){
  let fixo=0,estimado=0,eventual=0,parcela=0;
  for(const it of state.itens){
    if(it.natureza==="ordinaria") fixo+=+it.valor||0;
    else if(it.natureza==="estimada") estimado+=provavel(it);
    else if(it.natureza==="eventual"){ if((+it.mesIdx||0)===i) eventual+=+it.valor||0; }
    else if(it.natureza==="parcela"){ if(i<(+it.restam||0)) parcela+=+it.valor||0; }
  }
  return {fixo,estimado,eventual,parcela,total:fixo+estimado+eventual+parcela};
}
// itens ativos num mês i (com valor projetado), para a tela de detalhe
function itensDoMes(i){
  const out=[];
  for(const it of state.itens){
    let v=0, ativo=false;
    if(it.natureza==="ordinaria"){ v=+it.valor||0; ativo=true; }
    else if(it.natureza==="estimada"){ v=provavel(it); ativo=true; }
    else if(it.natureza==="eventual"){ if((+it.mesIdx||0)===i){ v=+it.valor||0; ativo=true; } }
    else if(it.natureza==="parcela"){ if(i<(+it.restam||0)){ v=+it.valor||0; ativo=true; } }
    if(ativo) out.push({...it, _v:v, _totalParc: it.natureza==="parcela"?Math.max(Math.round((+it.total)/(+it.valor||1)),+it.restam||1):null, _parcelaNum: it.natureza==="parcela"?(Math.max(Math.round((+it.total)/(+it.valor||1)),+it.restam||1)-(+it.restam||0)+i+1):null});
  }
  return out.sort((a,b)=>b._v-a._v);
}

// ===== MOTOR DE ANÁLISE (determinístico, funciona sem IA) =====
const Analise={
  // gasto mensal médio por categoria (considerando o mês corrente)
  porCategoria(){
    const map={};
    for(const it of itensDoMes(0)){ map[it.cat]=(map[it.cat]||0)+it._v; }
    return Object.entries(map).map(([cat,v])=>({cat,v})).sort((a,b)=>b.v-a.v);
  },
  // principais despesas dos próximos N meses, opcionalmente filtrando por categoria
  principaisProximos(nMeses, categoria){
    const acc={};
    for(let i=0;i<nMeses;i++){
      for(const it of itensDoMes(i)){
        if(categoria && it.cat!==categoria) continue;
        acc[it.nome]=acc[it.nome]||{nome:it.nome,cat:it.cat,total:0,nat:it.natureza};
        acc[it.nome].total+=it._v;
      }
    }
    return Object.values(acc).sort((a,b)=>b.total-a.total);
  },
  // simula antecipar K parcelas de um parcelamento: quanto sai do caixa agora e quanto alivia à frente
  anteciparParcela(itemId, k){
    const it=state.itens.find(x=>x.id===itemId); if(!it||it.natureza!=="parcela") return null;
    const restam=+it.restam||0, valor=+it.valor||0;
    const kReal=Math.min(k,restam);
    const desembolsoAgora=kReal*valor;
    const novoRestam=restam-kReal;
    // alívio: nos próximos kReal meses, a parcela deixa de existir mais cedo
    return {nome:it.nome, valor, restam, kReal, desembolsoAgora, novoRestam,
      mesesAliviados:kReal, economiaJuros:null};
  },
  // total comprometido em parcelas e quando "desincha"
  evolucaoParcelas(){
    const p=projecao();
    return p.map(x=>({mes:x.mes, ano:x.ano, parcela:x.parcela}));
  },
  // resumo compacto dos dados para enviar à IA
  resumoParaIA(){
    const cat=this.porCategoria();
    const p=projecao();
    return {
      renda:state.renda, metaPct:state.metaPct, horizonte:state.horizonte,
      gastoMesAtual:p[0].total, saldoMesAtual:p[0].sobra,
      porCategoria:cat,
      projecao:p.map(x=>({mes:x.mes+"/"+x.ano, gasto:Math.round(x.total), saldo:Math.round(x.sobra), parcelas:Math.round(x.parcela)})),
      parcelamentos:state.itens.filter(i=>i.natureza==="parcela").map(i=>({nome:i.nome,valor:i.valor,faltam:i.restam,cat:i.cat})),
    };
  }
};
// receita extra (não recorrente) de um mês i
function receitaExtraMes(i){
  return (state.receitas||[]).reduce((s,r)=>s+((+r.mesIdx||0)===i?(+r.valor||0):0),0);
}
function projecao(){
  const now=new Date(),out=[];
  for(let i=0;i<state.horizonte;i++){
    const g=gastoDoMes(i), ideal=state.renda*(1-state.metaPct);
    const extra=receitaExtraMes(i);
    const rendaMes=state.renda+extra;
    const mIdx=(now.getMonth()+i)%12, ano=now.getFullYear()+Math.floor((now.getMonth()+i)/12);
    out.push({...g,idx:i,mes:MESES[mIdx],ano,ideal,extra,rendaMes,sobra:rendaMes-g.total});
  }
  return out;
}

// projeção visual da home: mês anterior + atual + próximos 10 (12 colunas)
function projecaoHome(){
  const now=new Date(), out=[];
  for(let off=-1; off<=10; off++){
    const g = off<0 ? gastoMesAnterior() : gastoDoMes(off);
    const ideal=state.renda*(1-state.metaPct);
    const d=new Date(now.getFullYear(), now.getMonth()+off, 1);
    out.push({...g, off, mes:MESES[d.getMonth()], ano:d.getFullYear(),
      ideal, sobra:state.renda-g.total, atual:off===0, passado:off<0});
  }
  return out;
}
// mês anterior: aproxima usando ordinárias+estimadas (recorrentes); parcelas e eventuais
// do passado não são modeladas, então usa a base recorrente como referência histórica.
function gastoMesAnterior(){
  let fixo=0,estimado=0;
  for(const it of state.itens){
    if(it.natureza==="ordinaria") fixo+=+it.valor||0;
    else if(it.natureza==="estimada") estimado+=provavel(it);
  }
  // assume que as parcelas atuais também existiam no mês anterior (visão conservadora)
  let parcela=0;
  for(const it of state.itens) if(it.natureza==="parcela" && (+it.restam||0)>0) parcela+=+it.valor||0;
  return {fixo,estimado,eventual:0,parcela,total:fixo+estimado+parcela};
}

// ---- Núcleo prospectivo: os 4 fatores sobre uma janela de projeção ----
function escoreProspectivo(p, renda, metaPct){
  const n=p.length||1, guardarAlvo=renda*metaPct;
  const gapMeses=p.filter(x=>x.sobra<0).length;
  const gapTotal=p.reduce((s,x)=>s+(x.sobra<0?-x.sobra:0),0);
  const quaseGap=p.filter(x=>x.sobra>=0 && x.sobra<guardarAlvo).length;
  const pesoRisco=(gapMeses + 0.5*quaseGap)/n;
  const fracSemGap=Math.pow(Math.max(0,1-pesoRisco), 1.3);
  const folgaMedia=p.reduce((s,x)=>s+x.sobra,0)/n;
  const fracFolga=Math.max(0,Math.min(folgaMedia/Math.max(renda*metaPct,1),1));
  const parcelaMedia=p.reduce((s,x)=>s+x.parcela,0)/n;
  const compromisso=parcelaMedia/Math.max(renda,1);
  const fracParcela=Math.max(0,Math.min((0.30-compromisso)/0.30,1));
  const cumpreMeta=p.filter(x=>x.sobra>=guardarAlvo).length/n;
  const W={gap:0.50,folga:0.18,parcela:0.18,meta:0.14};
  const scoreFuturo=100*(W.gap*fracSemGap+W.folga*fracFolga+W.parcela*fracParcela+W.meta*cumpreMeta);
  const fatores=[
    {nome:"Sem déficit (GAP)",frac:fracSemGap,peso:W.gap},
    {nome:"Folga de caixa",frac:fracFolga,peso:W.folga},
    {nome:"Parcelas sob controle",frac:fracParcela,peso:W.parcela},
    {nome:"Meta de poupança",frac:cumpreMeta,peso:W.meta},
  ];
  return {scoreFuturo,gapMeses,gapTotal,quaseGap,fatores};
}
function faixaDe(score){
  if(score>=85) return {nome:"Excelente",cor:"#065F46"};
  if(score>=65) return {nome:"Saudável",cor:"#3E8E5A"};
  if(score>=40) return {nome:"Atenção",cor:"#E0922F"};
  return {nome:"Crítico",cor:"#FA8072"};
}

// ---- Escore PREDITIVO de 6 meses: posiciona-se no mês 6 e projeta até o fim do horizonte ----
function calcularEscorePreditivo(renda, metaPct){
  const inicio=6;
  const p=projecao(); // já respeita state.horizonte (12 ou 18)
  const janela=p.slice(inicio); // do mês 6 até o fim (12→6 meses; 18→12 meses)
  if(!janela.length){
    return {score:null, indisponivel:true, faixa:faixaDe(0), janelaMeses:0};
  }
  const pros=escoreProspectivo(janela, renda, metaPct);
  const score=Math.round(pros.scoreFuturo);
  const mesAlvo=p[inicio]?`${p[inicio].mes}/${p[inicio].ano}`:"";
  return {score, faixa:faixaDe(score), gapMeses:pros.gapMeses, gapTotal:pros.gapTotal,
    quaseGap:pros.quaseGap, fatores:pros.fatores, janelaMeses:janela.length, mesAlvo, indisponivel:false};
}

// ---- Escore de comportamento financeiro (GAP como target) + retrospectivo ----
function calcularEscore(p, renda, metaPct){
  const pros=escoreProspectivo(p, renda, metaPct);
  const {scoreFuturo,gapMeses,gapTotal,quaseGap,fatores}=pros;

  // ---- componente RETROSPECTIVO: disciplina real dos meses fechados ----
  const fechados=(state.historico||[]).filter(h=>h.fechado);
  let scoreRetro=null;
  if(fechados.length){
    let soma=0;
    for(const h of fechados){
      const prev=h.previsto||0, pago=h.pago||0, rmes=h.renda||renda;
      const dentroRenda = pago<=rmes ? 1 : Math.max(0, 1-(pago-rmes)/rmes);
      const aderiu = prev>0 ? Math.max(0, 1-Math.abs(pago-prev)/prev) : 1;
      soma += 0.6*dentroRenda + 0.4*aderiu;
    }
    scoreRetro=100*(soma/fechados.length);
  }

  // ---- combinação: histórico ganha peso até 40% conforme acumula ----
  let score, pesoRetro=0;
  if(scoreRetro!=null){
    pesoRetro=Math.min(0.40, fechados.length*0.10);
    score=Math.round((1-pesoRetro)*scoreFuturo + pesoRetro*scoreRetro);
  }else{
    score=Math.round(scoreFuturo);
  }

  const faixa=faixaDe(score);
  return {score,faixa,gapMeses,gapTotal,quaseGap,
    scoreFuturo:Math.round(scoreFuturo),
    scoreRetro:scoreRetro!=null?Math.round(scoreRetro):null,
    pesoRetro, mesesFechados:fechados.length,
    fatores};
}

// ---------- itens ----------
function lancar(item){ item.id=item.natureza[0]+Date.now()+Math.floor(Math.random()*99); state.itens=[...state.itens,item]; salvar(); }function atualizar(id,patch){ state.itens=state.itens.map(x=>x.id===id?{...x,...patch}:x); salvar(); }
function excluir(id){ if(!confirm("Excluir esta despesa?")) return; state.itens=state.itens.filter(x=>x.id!==id); salvar(); render(); }

// ---------- pagamentos e fechamento mensal ----------
function mesAtualRef(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function garanteMesRef(){
  const atual=mesAtualRef();
  if(state.mesRef!==atual){ state.mesRef=atual; state.pagosMes=state.pagosMes||{}; }
}
// Nível 1: quitar uma parcela (reduz restam em 1, registra)
function quitarParcela(id){
  const it=state.itens.find(x=>x.id===id); if(!it||it.natureza!=="parcela") return;
  if((+it.restam||0)<=0) return;
  const novo=(+it.restam)-1;
  marcarPago(id);
  if(novo<=0){ if(confirm("Esta foi a última parcela. Remover \""+it.nome+"\" das despesas?")){ excluir(id); return; } }
  atualizar(id,{restam:novo, total:(+it.valor||0)*novo});
  render();
}
// Nível 2: marcar/desmarcar despesa como paga no mês corrente
function marcarPago(id){ garanteMesRef(); state.pagosMes=state.pagosMes||{}; state.pagosMes[id]=true; salvar(); }
function togglePago(id){ garanteMesRef(); state.pagosMes=state.pagosMes||{}; if(state.pagosMes[id]) delete state.pagosMes[id]; else state.pagosMes[id]=true; salvar(); render(); }
function estaPago(id){ return !!(state.pagosMes&&state.pagosMes[id]); }
// valor de uma despesa no mês (para somar previsto/pago)
function valorMes(it){
  if(it.natureza==="estimada") return provavel(it);
  if(it.natureza==="parcela") return (+it.restam||0)>0?(+it.valor||0):0;
  if(it.natureza==="eventual") return (+it.mesIdx||0)===0?(+it.valor||0):0;
  return +it.valor||0;
}
// Nível 3: fechar o mês — tira foto previsto vs pago e guarda no histórico
function fecharMes(){
  garanteMesRef();
  const ym=state.mesRef;
  let previsto=0, pago=0;
  for(const it of state.itens){
    const v=valorMes(it); previsto+=v;
    if(estaPago(it.id)) pago+=v;
  }
  if(!confirm("Fechar o mês "+ym+"?\nPrevisto: "+fmt(previsto)+"\nPago: "+fmt(pago)+"\n\nIsso registra o mês no histórico e libera o próximo.")) return;
  state.historico=state.historico||[];
  // substitui se já existir registro do mesmo mês
  state.historico=state.historico.filter(h=>h.ym!==ym);
  state.historico.push({ym, previsto:Math.round(previsto), pago:Math.round(pago), renda:state.renda, fechado:true});
  state.historico.sort((a,b)=>a.ym<b.ym?-1:1);
  // avança: zera marcações e parcelas pagas já caíram via quitarParcela
  state.pagosMes={};
  state.mesRef=mesAtualRef();
  salvar(); render();
  alert("Mês "+ym+" fechado e registrado no histórico ✓");
}

// Card "Visão de Futuro": estética "aurora" (ref. layout aprovado) — gradiente
// roxo→azul, onda verde-água em glow, pontos brancos com hastes, pico laranja,
// meses dentro do gráfico, pílulas de renda e gasto, donut do escore ao centro.
function cardVisaoFuturo(p, esc){
  const W=340, H=215, footH=26; // footH = faixa dos meses dentro do card
  const serie=p.map(x=>x.total);
  const n=serie.length;
  const maxV=Math.max(state.renda, ...serie)*1.12, minV=Math.min(...serie)*0.82;
  const px=i=>(i/(n-1))*W;
  const py=v=>(H-footH)-((v-minV)/(maxV-minV||1))*(H-footH-14)+8;
  function pathDe(vals){
    let d=`M0 ${py(vals[0]).toFixed(1)}`;
    for(let i=1;i<vals.length;i++){
      const x0=px(i-1),y0=py(vals[i-1]),x1=px(i),y1=py(vals[i]);
      const xc=(x0+x1)/2;
      d+=` C ${xc.toFixed(1)} ${y0.toFixed(1)}, ${xc.toFixed(1)} ${y1.toFixed(1)}, ${x1.toFixed(1)} ${y1.toFixed(1)}`;
    }
    return d;
  }
  const linha=pathDe(serie);
  const area=linha+` L ${W} ${H-footH} L 0 ${H-footH} Z`;
  // onda azul de base (camada inferior, mais "cheia")
  const ondaAzul=(()=>{ const vals=serie.map((v,i)=> minV + (maxV-minV)*0.28 + 7*Math.sin(i/1.4+1.2));
    return `<path d="${pathDe(vals)} L ${W} ${H-footH} L 0 ${H-footH} Z" fill="url(#gAuroraBlue)"/>`; })();
  const rendaY=py(state.renda);
  // pontos brancos brilhantes + hastes pontilhadas até a base
  const pontos=serie.map((v,i)=>{
    if(i===n-1) return "";
    const X=px(i).toFixed(1), Y=py(v).toFixed(1);
    return `<line x1="${X}" y1="${Y}" x2="${X}" y2="${H-footH}" stroke="#fff" stroke-width="1" stroke-dasharray="1.5 4" opacity=".35"/>
      <circle cx="${X}" cy="${Y}" r="8.5" fill="#7DE8D2" opacity=".3"/><circle cx="${X}" cy="${Y}" r="4.5" fill="#fff"/>`;
  }).join("");
  // pico final laranja com halo
  const ult=n-1, picoX=px(ult).toFixed(1), picoY=py(serie[ult]).toFixed(1);
  const pico=`<line x1="${picoX}" y1="${picoY}" x2="${picoX}" y2="${H-footH}" stroke="#fff" stroke-width="1" stroke-dasharray="1.5 4" opacity=".4"/>
    <circle cx="${picoX}" cy="${picoY}" r="13" fill="#FFFFFF" opacity=".5"/>
    <circle cx="${picoX}" cy="${picoY}" r="9" fill="#F0554A"/>
    <circle cx="${picoX}" cy="${picoY}" r="4" fill="#FFB4AC"/>`;
  const ang=esc.score*3.6;
  const gastoAtual=serie[0];
  // meses dentro do card (mostra ~9 rótulos)
  const passo=Math.max(1,Math.ceil(n/9));
  const lblMeses=p.map((x,i)=> (i%passo===0)?`<span style="flex:1;text-align:center">${x.mes}</span>`:`<span style="flex:1"></span>`).join("");
  return `<div style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#fff;padding:12px 12px 8px;position:relative;overflow:hidden;border-radius:22px;margin:0;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)">
    <div style="position:absolute;inset:0;background:radial-gradient(420px 220px at 80% -10%, rgba(120,230,180,.18), transparent 62%);pointer-events:none"></div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;position:relative">
      <span style="font-size:17px;font-weight:800;color:#fff">Visão de Futuro <span style="color:#BEE3CC;font-weight:600">(${state.horizonte} meses)</span></span>
    </div>
    <div style="position:relative">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="display:block;overflow:visible">
        <defs>
          <linearGradient id="gAuroraTeal" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8FE8B4" stop-opacity="0.95"/>
            <stop offset="55%" stop-color="#4CC98F" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#2FA379" stop-opacity="0.18"/>
          </linearGradient>
          <linearGradient id="gAuroraBlue" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5B8BD8" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#27498F" stop-opacity="0.75"/>
          </linearGradient>
          <filter id="glowTeal" x="-20%" y="-40%" width="140%" height="180%"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <path d="${area}" fill="url(#gAuroraTeal)"/>
        ${ondaAzul}
        <path d="${linha}" fill="none" stroke="#D8FFE8" stroke-width="2.5" filter="url(#glowTeal)"/>
        <line x1="0" y1="${rendaY.toFixed(1)}" x2="${W}" y2="${rendaY.toFixed(1)}" stroke="#fff" stroke-dasharray="4 5" opacity="0.28"/>
        ${pontos}${pico}
      </svg>
      <!-- pílula de renda (topo) -->
      <button onclick="_g.editRenda()" style="position:absolute;top:-4px;right:2px;background:rgba(255,255,255,.95);border:none;border-radius:16px;padding:6px 14px;font-size:14px;font-weight:800;color:#14324E;box-shadow:0 4px 14px rgba(0,0,0,.3)">${fmt(state.renda)} <span style="font-size:11px">✏️</span></button>
      <!-- pílula de gasto atual -->
      <div style="position:absolute;top:52%;right:2px;background:rgba(20,44,84,.88);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);border-radius:16px;padding:6px 14px;font-size:14px;font-weight:800">${fmt(gastoAtual)}</div>
      <!-- donut do escore ao centro -->
      <div style="position:absolute;top:44%;left:47%;transform:translate(-50%,-50%);text-align:center">
        <div style="display:inline-block;background:rgba(18,58,44,.8);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:5px 16px;font-size:13px;font-weight:700;color:#fff;margin-bottom:8px;backdrop-filter:blur(4px)">Comportamento</div>
        <div style="width:116px;height:116px;margin:0 auto;border-radius:50%;background:conic-gradient(#34D399 ${ang}deg, rgba(255,255,255,.2) ${ang}deg);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 34px rgba(8,30,24,.5);padding:7px">
          <div style="width:100%;height:100%;border-radius:50%;background:rgba(12,50,38,.86);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.12)">
            <span style="font-size:34px;font-weight:800;color:#fff;line-height:1">${esc.score}<span style="font-size:12px;color:#A9D8BC">/100</span></span>
            <span style="font-size:10px;font-weight:700;color:#7DE8D2;letter-spacing:1.2px">${esc.faixa.nome.toUpperCase()}</span>
          </div>
        </div>
      </div>
      <!-- meses dentro do card -->
      <div style="position:absolute;left:0;right:0;bottom:0;height:${footH}px;display:flex;align-items:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.85)">${lblMeses}</div>
    </div>
  </div>`;
}

// ===== Quadro dedicado: comparação de escores (hoje vs 6º mês) =====
function cardEscoresGrafico(){
  const esc=calcularEscore(projecao(), state.renda, state.metaPct);
  const pred=calcularEscorePreditivo(state.renda, state.metaPct);
  const escHoje=esc.score;
  const escPred=pred.indisponivel?null:pred.score;
  const delta=escPred!=null?escPred-escHoje:0;
  const W=320,H=160;
  // escala com zoom na faixa 40-100
  const lo=40,hi=100;
  const y=s=>{ const f=Math.max(0,Math.min((s-lo)/(hi-lo),1)); return H-14 - f*(H-30); };
  const yH=y(escHoje), yP=escPred!=null?y(escPred):null;
  const faixaCor=s=>s>=85?"#00C49F":s>=65?"#3FD9BC":s>=40?"#E0922F":"#FF6584";
  // ondas decorativas de fundo (estética orgânica do gráfico principal), em azul e verde
  const onda=(base,amp,off,op,cor)=>{
    let d=`M0 ${base}`;
    for(let i=1;i<=8;i++){ const x=(i/8)*W; const yy=base+amp*Math.sin(i/1.5+off); const xc=x-(W/8)/2; d+=` Q ${xc} ${base+amp*Math.sin((i-0.5)/1.5+off)}, ${x} ${yy}`; }
    return `<path d="${d} L ${W} ${H} L 0 ${H} Z" fill="${cor}" opacity="${op}"/>`;
  };
  // linha curva suave de um escore + área sob ela
  const curva=(yv)=>{
    const wobble=2.2;
    let d=`M0 ${yv}`;
    for(let i=1;i<=6;i++){ const x=(i/6)*W; const yy=yv+wobble*Math.sin(i*1.3); const xc=x-(W/6)/2; d+=` Q ${xc} ${yv+wobble*Math.sin((i-0.5)*1.3)}, ${x} ${yy}`; }
    return d;
  };
  const cHoje=curva(yH);
  const areaHoje=`<path d="${cHoje} L ${W} ${H} L 0 ${H} Z" fill="url(#gEscHoje)"/><path d="${cHoje}" stroke="#00E0C0" stroke-width="2.5" fill="none" filter="url(#glowG)"/>`;
  const cPred=escPred!=null?curva(yP):null;
  const areaPred=escPred!=null?`<path d="${cPred} L ${W} ${H} L 0 ${H} Z" fill="url(#gEscPred)"/><path d="${cPred}" stroke="#3FA9FF" stroke-width="2.5" fill="none" filter="url(#glowB)"/>`:"";
  const camadas = (escPred!=null && escPred>=escHoje) ? areaHoje+areaPred : areaPred+areaHoje;
  // pontos brilhantes nas pontas
  const ptHoje=`<circle cx="${W-7}" cy="${yH.toFixed(1)}" r="5" fill="#00E0C0" filter="url(#glowG)"/><circle cx="${W-7}" cy="${yH.toFixed(1)}" r="2.4" fill="#fff"/>`;
  const ptPred=escPred!=null?`<circle cx="${W-7}" cy="${yP.toFixed(1)}" r="5" fill="#3FA9FF" filter="url(#glowB)"/><circle cx="${W-7}" cy="${yP.toFixed(1)}" r="2.4" fill="#fff"/>`:"";
  return `<div class="card" style="background:linear-gradient(160deg,#0E3D52 0%,#0F3D2E 60%,#0A2540 100%);border:none;color:#fff;padding:16px 14px 14px;position:relative;overflow:hidden">
    <div style="font-size:15px;font-weight:800;margin-bottom:2px">Comparativo de escore</div>
    <div style="font-size:11px;color:var(--cyan);margin-bottom:12px">hoje vs. como estará daqui a 6 meses</div>
    <div style="position:relative">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="display:block;overflow:visible">
        <defs>
          <linearGradient id="gEscHoje" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00E0C0" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#00C49F" stop-opacity="0.04"/>
          </linearGradient>
          <linearGradient id="gEscPred" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3FA9FF" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#1E5FA8" stop-opacity="0.04"/>
          </linearGradient>
          <filter id="glowG" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="glowB" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        ${onda(H*0.62,7,0,0.20,"#0E6E66")}
        ${onda(H*0.70,6,2,0.22,"#0B4F6C")}
        ${onda(H*0.80,5,4,0.18,"#103A6B")}
        ${[50,60,70,80,90,100].map(v=>`<line x1="0" y1="${y(v).toFixed(1)}" x2="${W}" y2="${y(v).toFixed(1)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/><text x="2" y="${(y(v)-2).toFixed(1)}" fill="rgba(255,255,255,.3)" font-size="8">${v}</text>`).join("")}
        ${camadas}
        ${ptHoje}${ptPred}
      </svg>
    </div>
    <div style="display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:10.5px">
      <span style="display:flex;align-items:center;gap:5px;color:#00E0C0"><span style="width:12px;height:8px;border-radius:2px;background:linear-gradient(#00E0C0,rgba(0,224,192,.1))"></span>hoje</span>
      ${escPred!=null?`<span style="display:flex;align-items:center;gap:5px;color:#3FA9FF"><span style="width:12px;height:8px;border-radius:2px;background:linear-gradient(#3FA9FF,rgba(63,169,255,.1))"></span>6º mês</span>`:""}
    </div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <div style="flex:1;background:rgba(0,224,192,.1);border:1px solid rgba(0,224,192,.3);border-radius:12px;padding:10px 12px">
        <div style="font-size:10px;color:#00E0C0;font-weight:700">ESCORE HOJE</div>
        <div style="font-size:26px;font-weight:800;color:#fff;line-height:1.1">${escHoje}<span style="font-size:11px;color:var(--cyan)">/100</span></div>
        <div style="font-size:10px;font-weight:700;color:${faixaCor(escHoje)}">${esc.faixa.nome}</div>
      </div>
      <div style="flex:1;background:rgba(63,169,255,.1);border:1px solid rgba(63,169,255,.35);border-radius:12px;padding:10px 12px">
        <div style="font-size:10px;color:#3FA9FF;font-weight:700">EM 6 MESES</div>
        <div style="font-size:26px;font-weight:800;color:#fff;line-height:1.1">${escPred??"—"}${escPred!=null?`<span style="font-size:11px;color:var(--cyan)">/100</span>`:""}</div>
        <div style="font-size:10px;font-weight:700;color:${escPred!=null?faixaCor(escPred):"var(--cyan)"}">${escPred!=null?pred.faixa.nome:"aumente p/ 18m"}</div>
      </div>
    </div>
    ${escPred!=null?`<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;font-size:12px">
      ${delta>0?`<span style="color:var(--ggreen);font-weight:800">▲ +${delta} pontos</span><span style="color:var(--cyan)">sua trajetória melhora</span>`:delta<0?`<span style="color:#3FA9FF;font-weight:800">▼ ${delta} pontos</span><span style="color:var(--cyan)">atenção à trajetória</span>`:`<span style="color:var(--cyan)">trajetória estável</span>`}
    </div>
    <div style="font-size:10.5px;color:var(--cyan);text-align:center;margin-top:8px;line-height:1.4">${delta>0?`Mantendo o rumo, daqui a 6 meses você chega a ${escPred}. Gaste hoje como quem já está lá. 💪`:delta<0?`Sua trajetória cai para ${escPred} em 6 meses. Ajustar os gastos agora evita isso.`:`Seu comportamento se mantém estável nos próximos 6 meses.`}</div>`:`<div style="font-size:10.5px;color:var(--cyan);text-align:center;margin-top:10px">Mude o seletor para 18 meses para projetar o escore além do 6º mês.</div>`}
  </div>`;
}
// ===== INCENTIVOS DIÁRIOS (eventos/viagens programados) =====
// imagens temáticas (gradientes SVG inline — sem dependência externa) por tipo
const TEMA_INCENTIVO={
  viagem:{emoji:"✈️",g:["#0EA5E9","#0A2540"]},
  praia:{emoji:"🏖️",g:["#06B6D4","#0E7490"]},
  carro:{emoji:"🚗","g":["#475569","#0A2540"]},
  casa:{emoji:"🏠",g:["#10B981","#004B49"]},
  festa:{emoji:"🎉",g:["#FF6584","#7C2D49"]},
  estudo:{emoji:"🎓",g:["#6366F1","#1E1B4B"]},
  outro:{emoji:"⭐",g:["#00C49F","#004B49"]},
};
function ytId(url){ const m=(url||"").match(/(?:youtu\.be\/|v=|shorts\/)([\w-]{11})/); return m?m[1]:null; }
function miniaturaIncentivo(inc){
  const yt=ytId(inc.link);
  if(yt) return `<img src="https://img.youtube.com/vi/${yt}/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover" alt="">`;
  if(inc.img) return `<img src="${inc.img}" style="width:100%;height:100%;object-fit:cover" alt="">`;
  const t=TEMA_INCENTIVO[inc.tema||"outro"]||TEMA_INCENTIVO.outro;
  return `<div style="width:100%;height:100%;background:linear-gradient(135deg,${t.g[0]},${t.g[1]});display:flex;align-items:center;justify-content:center;font-size:34px">${t.emoji}</div>`;
}
function cardIncentivos(){
  const list=(state.incentivos||[]).slice().sort((a,b)=>(a.data||"")<(b.data||"")?-1:1);
  const novo=`<button onclick="_g.novoIncentivo()" style="flex:none;width:130px;background:#FAF8FD;border:1.5px dashed #D6C7EC;border-radius:14px;color:var(--nu);padding:0;height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px">
    <span style="font-size:26px;color:var(--nu)">＋</span><span style="font-size:12px;font-weight:700;color:var(--ink)">Adicionar<br>evento</span></button>`;
  const cards=list.map(inc=>{
    const yt=ytId(inc.link), temLink=!!inc.link;

function svgGauge(frac){
  // arco semicircular de 0 a 1
  const a0=Math.PI, a1=Math.PI*(1-frac); // da esquerda (180º) subindo
  const cx=30,cy=30,r=24;
  const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);

  const large=frac>0.5?1:0;

  return `<svg width="60" height="34" viewBox="0 0 60 34" fill="none">
    <path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 0 1 ${xe.toFixed(1)} ${ye.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-width="5" stroke-linecap="round"/>

  </svg>`;
}

// ===== Experiência conversacional em tela cheia (estilo Siri) =====
// PATCH (bug do microfone / "piscar" do chat): a implementação original chamava
// atualizarChat() -> ov.outerHTML = renderChat() a cada mudança de estado
// (idle/listening/computing) e a cada mensagem nova. Isso DESTRUÍA E RECRIAVA
// toda a árvore DOM do modal — inclusive o próprio botão de microfone que
// acabara de ser tocado — no meio do mesmo gesto que iniciava o
// SpeechRecognition. No Safari/iOS isso é agressivo o suficiente para abortar
// a captura de áudio silenciosamente, além de tirar o foco do campo de texto e
// re-tocar a animação de entrada do modal (o "piscar" percebido).
// Agora: a abertura do chat continua usando renderChat() (uma vez só, é
// intencional que o modal "deslize" ao abrir). Depois disso, apenas:
//  - o orbe muda de cor/estado via setOrbe() (mutação de estilo, sem destruir DOM)
//  - o rótulo (“ouvindo…”/“pensando…”) muda via textContent
//  - novas mensagens são inseridas com insertAdjacentHTML (append), não outerHTML
G.abrirChat=()=>{
  if(!cfg.funcaoUrl){ /* sem IA: ainda permite perguntas rápidas */ }
  chatAberto=true; chatEstado="idle";
  if(!chatMsgs.length){
    const esc=calcularEscore(projecao(),state.renda,state.metaPct);
    const nm=primeiroNome(state.nome);
    const ola = nm ? `Olá, <b>${nm}</b>!` : "Olá!";
    chatMsgs=[{de:"ia", html:`${ola} Sou o <b>GuavAI</b>, seu copiloto financeiro. Seu escore está em <b>${esc.score}</b> (${esc.faixa.nome}).<br>Como posso ajudar hoje?`}];
  }
  document.body.insertAdjacentHTML("beforeend", renderChat());
  document.body.style.overflow="hidden";
  ligarChatMic();
};
G.fecharChat=()=>{
  chatAberto=false; document.body.style.overflow="";
  const ov=document.getElementById("chatOv"); if(ov) ov.remove();
  if(recAg){ try{recAg.stop();}catch{} }
};
function renderChat(){
  const [c1,c2]=ORBE_CORES[chatEstado]||ORBE_CORES.idle;
  const sugestoes=[
    ["📊 Gastos por categoria","cat"],["🍽️ Alimentação 3 meses","alim3"],
    ["💳 Quando as parcelas aliviam","parc"],["⏩ Antecipar parcelas","antec"],
  ];
  const temIA=!!cfg.funcaoUrl;
  const orbeGrande = chatEstado!=="idle" || chatMsgs.length<=1;
  const tamOrbe = orbeGrande ? 96 : 52;
  const baloes = chatMsgs.map(m=>baloaHTML(m)).join("");
  const rotuloEstado = chatEstado==="listening"?"ouvindo…":chatEstado==="computing"?"pensando…":"";
  return `<div id="chatOv" style="position:fixed;inset:0;z-index:210;background:linear-gradient(180deg,#14532D 0%,#0F3D2E 45%,#0A2540 100%);display:flex;flex-direction:column;animation:slideIn .3s">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:calc(12px + env(safe-area-inset-top)) 16px 8px">
      <span style="color:#fff;font-weight:800;font-size:16px">GuavAI</span>
      <button onclick="_g.fecharChat()" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px">✕</button>
    </div>
    <div id="chatOrbe" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:${orbeGrande?'20px':'8px'} 0;transition:padding .4s">
      ${orbeGuavAI(chatEstado,tamOrbe,'orbeGuavChat')}
      <div id="chatRotulo" style="color:${c2};font-size:12px;font-weight:600;margin-top:10px;letter-spacing:.3px">${rotuloEstado}</div>
    </div>
    <div id="chatMsgs" style="flex:1;overflow-y:auto;padding:8px 16px 12px;display:flex;flex-direction:column;gap:10px">
      ${baloes}
    </div>
    ${chatMsgs.length<=1?`<div id="chatSugestoes" style="padding:0 12px 8px;display:flex;gap:7px;overflow-x:auto">${sugestoes.map(([t,q])=>`<button onclick="_g.chatRapida('${q}')" style="white-space:nowrap;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:8px 13px;border-radius:20px">${t}</button>`).join("")}</div>`:""}
    <div id="chatBar" style="padding:8px 12px calc(12px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:center;background:rgba(8,36,28,.6);backdrop-filter:blur(10px)">
      <input id="chatInput" onkeydown="if(event.key==='Enter')_g.chatEnviar()" placeholder="${temIA?'digite ou toque no microfone…':'ative a IA em ⚙️ p/ conversar'}" ${temIA?'':'disabled'} style="flex:1;min-width:0;border:none;border-radius:22px;padding:13px 16px;font-size:14px;background:rgba(255,255,255,.95);color:var(--ink)">
      <button id="chatMic" class="micBtn" ${temIA?'':'disabled'} aria-label="Toque para gravar" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;width:46px;height:46px;border-radius:50%;font-size:19px;flex:none;${temIA?'':'opacity:.4'}">🎙️</button>
      <button id="chatSend" onclick="_g.chatEnviar()" ${temIA?'':'disabled'} style="background:var(--gpink);border:none;color:#fff;width:46px;height:46px;border-radius:50%;font-size:18px;flex:none;${temIA?'':'opacity:.4'}">▸</button>
    </div>
  </div>`;
}
function baloaHTML(m){
  return m.de==="user"
    ? `<div style="align-self:flex-end;max-width:82%;background:var(--gpink);color:#fff;padding:11px 14px;border-radius:18px 18px 4px 18px;font-size:14px;line-height:1.45;box-shadow:0 2px 10px rgba(255,101,132,.3)">${m.html}</div>`
    : `<div style="align-self:flex-start;max-width:88%;background:#fff;color:#241A45;padding:12px 15px;border-radius:18px 18px 18px 4px;font-size:13.5px;line-height:1.5;box-shadow:0 3px 14px rgba(0,0,0,.12)">${m.html}</div>`;
}
// PATCH: adiciona só a bolha nova (sem recriar o modal inteiro) e remove os
// chips de sugestão após a primeira mensagem, sem outerHTML.
function appendChatBubble(m){
  const box=document.getElementById("chatMsgs");
  if(!box) return;
  box.insertAdjacentHTML("beforeend", baloaHTML(m));
  box.scrollTop=box.scrollHeight;
  const sug=document.getElementById("chatSugestoes"); if(sug) sug.remove();
}
// PATCH: atualização leve de estado — não recria DOM. É isso que resolve tanto
// o "piscar" quanto o microfone não capturar (o botão/inputs nunca são destruídos).
function atualizarChat(){
  const ov=document.getElementById("chatOv"); if(!ov) return;
  ov.outerHTML=renderChat();
  const box=document.getElementById("chatMsgs"); if(box) box.scrollTop=box.scrollHeight;
}
function setChatEstado(e){
  chatEstado=e;
  if(!document.getElementById("chatOv")) return;
  setOrbe(e,"orbeGuavChat");
  const rot=document.getElementById("chatRotulo");
  if(rot){
    const [,c2]=ORBE_CORES[e]||ORBE_CORES.idle;
    rot.textContent = e==="listening"?"ouvindo…":e==="computing"?"pensando…":"";
    rot.style.color=c2;
  }
}
G.chatEnviar=async()=>{
  const inp=document.getElementById("chatInput"); const q=(inp&&inp.value||"").trim();
  if(!q) return;
  const userMsg={de:"user", html:q.replace(/</g,"&lt;")};
  chatMsgs.push(userMsg); appendChatBubble(userMsg);
  if(inp) inp.value="";
  if(!cfg.funcaoUrl){ const m={de:"ia", html:"Para conversar livremente, ative a IA em ⚙️ Configurar. Enquanto isso, use os atalhos de análise rápida."}; chatMsgs.push(m); appendChatBubble(m); return; }
  setChatEstado("computing");
  try{
    const r=await fetch(cfg.funcaoUrl,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({pergunta:q, dados:Analise.resumoParaIA()})});
    const d=await r.json();
    const txt=d.resposta||d.texto||"";
    const m={de:"ia", html:mdParaHtml(txt)||"Não consegui responder agora."}; chatMsgs.push(m); appendChatBubble(m);
  }catch(e){ const m={de:"ia", html:"Não consegui consultar a IA agora. Tente novamente em instantes."}; chatMsgs.push(m); appendChatBubble(m); }
  setChatEstado("idle");
};
G.chatRapida=(q)=>{
  // reaproveita o motor determinístico Analise para respostas rápidas dentro do chat
  const rotulos={cat:"Gastos por categoria",alim3:"Alimentação nos próximos 3 meses",parc:"Quando as parcelas aliviam",antec:"Antecipar parcelas"};

// ===== Gravação de voz estilo WhatsApp =====
// Segurar o microfone grava; soltar envia; arrastar para a esquerda (ou tocar
// enquanto grava) cancela. A barra de digitação vira uma "onda" animada com
// cronômetro, dando o mesmo feedback tátil/visual do WhatsApp.
// Reaproveita Web Speech (transcrição on-device) — não sobe áudio pro servidor,
// então o "envio" é o texto transcrito, mais rápido e privado.
let recState={rec:null,ativo:false,cancelado:false,captou:false,texto:"",t0:0,timer:null,startX:0};

function ligarChatMic(){
  const mic=document.getElementById("chatMic");
  if(!mic) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    mic.addEventListener("click",()=>{ const inp=document.getElementById("chatInput"); if(inp) inp.placeholder="voz indisponível neste aparelho — digite"; });
    return;
  }
  // TOQUE ÚNICO: primeiro toque inicia; segundo toque conclui e envia.
  mic.addEventListener("click",e=>{ e.preventDefault(); if(recState.ativo) finalizarGravacao(); else iniciarGravacao(); });
}
function ondaHTML(){
  let bars="";
  for(let i=0;i<22;i++){ const h=30+Math.round(Math.abs(Math.sin(i*1.3))*70); bars+=`<span style="animation-delay:${(i%7)*0.08}s;height:${h}%"></span>`; }
  return bars;
}
function iniciarGravacao(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const mic=document.getElementById("chatMic"); if(!mic) return;
  recState.cancelado=false; recState.captou=false; recState.texto="";
  try{
    const r=new SR(); recState.rec=r; recAg=r;
    r.lang="pt-BR"; r.continuous=true; r.interimResults=true; r.maxAlternatives=1;
    r.onresult=ev=>{ let t=""; for(let i=0;i<ev.results.length;i++) t+=ev.results[i][0].transcript; recState.texto=t; recState.captou=!!t.trim(); };
    r.onerror=ev=>{
      const inp=document.getElementById("chatInput");
      if(inp && ev){ if(ev.error==="not-allowed") inp.placeholder="permita o microfone no Safari"; else if(ev.error==="no-speech") inp.placeholder="não ouvi — toque no microfone e fale"; }
      encerrarUI();
    };
    r.onend=()=>{
      const enviar = recState.captou && !recState.cancelado;
      const txt=recState.texto.trim();
      encerrarUI();
      if(enviar && txt){ const inp=document.getElementById("chatInput"); if(inp) inp.value=txt; G.chatEnviar(); }
    };
    r.start();
    recState.ativo=true; recState.t0=Date.now();
    mostrarUIgravacao();
    setChatEstado("listening");
  }catch(err){ recState.ativo=false; }
}
function mostrarUIgravacao(){
  const bar=document.getElementById("chatBar"); const mic=document.getElementById("chatMic");
  if(!bar) return;
  if(mic){ mic.classList.add("recording"); mic.textContent="⏹"; } // vira "concluir"
  const rec=document.createElement("div"); rec.className="recBar"; rec.id="recBarLive";
  rec.innerHTML=`<button onclick="_g.cancelarGravacao()" aria-label="cancelar" style="background:none;border:none;color:rgba(255,255,255,.8);font-size:16px;flex:none;padding:0 2px">✕</button>

    <div class="recWave">${ondaHTML()}</div>
    <span class="recCancelHint">toque em ⏹ p/ concluir</span>`;

  clearInterval(recState.timer);

    const el=document.getElementById("recTime"); if(el) el.textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  },250);
}
function finalizarGravacao(){

  recState.cancelado=false;
  try{ recState.rec&&recState.rec.stop(); }catch{ encerrarUI(); }
}
function cancelarGravacao(){

function encerrarUI(){

// Converte a resposta da IA (Markdown) em HTML estilizado com a cara do app
function mdParaHtml(md){
  if(!md) return "";
  const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inline=s=>esc(s)
    .replace(/\*\*(.+?)\*\*/g,'<b style="color:var(--navy)">$1</b>')
    .replace(/(^|[^*])\*([^*]+?)\*/g,'$1<i>$2</i>')
    .replace(/`(.+?)`/g,'<code style="background:#EEF2F4;padding:1px 5px;border-radius:5px;font-size:12px">$1</code>')
    .replace(/R\$ ?([\d.,]+)/g,'<span style="color:var(--emerald);font-weight:700">R$ $1</span>');
  const linhas=md.split("\n");
  let out=[], i=0;
  while(i<linhas.length){
    let l=linhas[i];
    // tabela markdown
    if(/^\s*\|.*\|/.test(l) && i+1<linhas.length && /^\s*\|[\s:|-]+\|/.test(linhas[i+1])){
      const head=l.split("|").filter(c=>c.trim()).map(c=>c.trim());
      i+=2; const rows=[];
      while(i<linhas.length && /^\s*\|.*\|/.test(linhas[i])){ rows.push(linhas[i].split("|").filter(c=>c.trim()).map(c=>c.trim())); i++; }
      let t=`<div style="border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:10px 0">`;
      rows.forEach((r,ri)=>{
        t+=`<div style="display:flex;justify-content:space-between;gap:8px;padding:9px 12px;${ri<rows.length-1?'border-bottom:1px solid var(--line);':''}background:${ri%2?'#F7FAFB':'#fff'}">`;
        r.forEach((cel,ci)=>{ t+=`<span style="${ci===0?'font-weight:600;flex:1':'font-weight:700;color:var(--emerald);text-align:right'};font-size:13px">${inline(cel)}</span>`; });
        t+=`</div>`;
      });
      t+=`</div>`; out.push(t); continue;
    }
    // títulos ##
    if(/^#{1,6}\s/.test(l)){ out.push(`<div style="font-size:15px;font-weight:800;color:var(--navy);margin:12px 0 6px">${inline(l.replace(/^#+\s/,""))}</div>`); i++; continue; }
    // divisória ---
    if(/^\s*---+\s*$/.test(l)){ out.push(`<div style="height:1px;background:var(--line);margin:12px 0"></div>`); i++; continue; }
    // dica/destaque (linha que começa com 💡 ou "Dica")
    if(/^\s*(💡|\*\*?💡)/.test(l) || /dica/i.test(l.slice(0,12))){
      out.push(`<div style="background:var(--greenSoft);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:12.5px;line-height:1.5">${inline(l.replace(/^\s*-\s*/,""))}</div>`); i++; continue;
    }
    // lista com - ou •
    if(/^\s*[-•]\s/.test(l)){
      let items=[];
      while(i<linhas.length && /^\s*[-•]\s/.test(linhas[i])){ items.push(linhas[i].replace(/^\s*[-•]\s/,"")); i++; }
      out.push(`<div style="display:flex;flex-direction:column;gap:6px;margin:6px 0">${items.map(it=>`<div style="display:flex;gap:8px;font-size:13px"><span style="color:var(--gpink);font-weight:800">•</span><span>${inline(it)}</span></div>`).join("")}</div>`);
      continue;
    }
    // linha vazia
    if(/^\s*$/.test(l)){ i++; continue; }
    // parágrafo normal
    out.push(`<div style="font-size:13.5px;line-height:1.55;margin:4px 0">${inline(l)}</div>`); i++;
  }
  return out.join("");
}

// ===== Stories de Projeção: narra a trajetória futura com o orbe mudando de estado =====
function gerarStorySteps(){
  const p=projecao();
  const esc=calcularEscore(p,state.renda,state.metaPct);
  const pred=calcularEscorePreditivo(state.renda,state.metaPct);
  const steps=[];
  // 1. estado atual (IDLE)
  steps.push({aiState:"idle", titulo:"Hoje", texto:`Seu Escore de Comportamento está em <b>${esc.score} pontos</b> (${esc.faixa.nome}).`});
  // 2. projeção 6 meses (COMPUTING)
  if(!pred.indisponivel){
    const delta=pred.score-esc.score;
    steps.push({aiState:"computing", titulo:"Avançando no tempo…", texto:`Daqui a 6 meses (${pred.mesAlvo}), sua trajetória chega a <b>${pred.score} pontos</b>${delta>0?` — uma melhora de <b>+${delta}</b>`:delta<0?` — uma queda de <b>${delta}</b>`:""}.`});
  }
  // 3. meta de poupança acumulada
  const guardadoAno=state.renda*state.metaPct*Math.min(state.horizonte,12);
  steps.push({aiState:"computing", titulo:"Sua meta", texto:`Mantendo o ritmo, em ${Math.min(state.horizonte,12)} meses você terá guardado cerca de <b>${fmt(guardadoAno)}</b>.`});
  // 4. alerta de pico de parcelas ou GAP (ALERT) — ou fechamento positivo (IDLE)
  const picoMes=p.reduce((a,x)=>x.parcela>a.parcela?x:a,p[0]);
  if(esc.gapMeses>0){
    steps.push({aiState:"alert", titulo:"Atenção", texto:`Detectei <b>${esc.gapMeses} ${esc.gapMeses===1?'mês':'meses'}</b> com déficit no horizonte. Vale ajustar os gastos antes que aconteça.`, acao:"proj"});
  } else if(picoMes && picoMes.parcela>state.renda*0.25){
    steps.push({aiState:"alert", titulo:"Fique de olho", texto:`Em <b>${picoMes.mes}/${String(picoMes.ano).slice(2)}</b> há um pico de parcelas (${fmt(picoMes.parcela)}). Nada crítico, mas acompanhe.`, acao:"proj"});
  } else {
    steps.push({aiState:"idle", titulo:"Tudo no rumo", texto:`Nenhum mês com déficit à frente. Seu orçamento está saudável — continue assim! 💪`});
  }
  return steps;
}

  try{
    const r=await fetch(cfg.funcaoUrl,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({pergunta, dados:Analise.resumoParaIA()})});
    const d=await r.json();
    const txt=d.resposta||d.texto||JSON.stringify(d);
    respostaAgente=bolha(mdParaHtml(txt));
  }catch(e){ respostaAgente=bolha("Não consegui consultar a IA agora. Tente as perguntas rápidas acima."); }
  document.getElementById("agResp").innerHTML=respostaAgente;
  setOrbe(estadoOrbePadrao());
};

// ---------- Projeção ----------
function viewProj(){
  const p=projecao(), maxV=Math.max(...p.map(x=>Math.max(x.total,state.renda)),1);
  const estouro=p.filter(x=>x.total>state.renda).length, atencao=p.filter(x=>x.total>x.ideal).length;
  const aviso=estouro>0?`🛑 ${estouro} ${estouro===1?'mês ultrapassa':'meses ultrapassam'} a renda`
    :atencao>0?`${atencao} ${atencao===1?'mês fica':'meses ficam'} acima do ideal`:"todos os meses dentro do ideal 👏";
  const barras=p.map((x,bi)=>{
    const h=(x.total/maxV)*130, idealY=(x.ideal/maxV)*130, over=x.total>state.renda, tt=Math.max(x.total,1);
    const seg=(val,col,op=1)=>val>0?`<div style="height:${(val/tt)*100}%;background:${col};opacity:${op}"></div>`:"";
    return `<div onclick="_g.verMes(${bi})" style="min-width:${state.horizonte===18?15:22}px;flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer">
      <div style="width:100%;height:130px;position:relative;display:flex;align-items:flex-end">
        <div style="position:absolute;bottom:${idealY}px;left:0;right:0;height:1px;background:var(--green);opacity:.45"></div>
        <div style="width:100%;height:${h}px;border-radius:4px 4px 0 0;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end">
          ${seg(x.parcela,"var(--guava)",.9)}${seg(x.eventual,"var(--blue)",.8)}${seg(x.estimado,"var(--green)",.55)}${seg(x.fixo,over?"#1E293B":"var(--graphite)")}
        </div>
      </div>
      <div style="font-size:8.5px;color:var(--mute);margin-top:3px">${x.mes}</div>
    </div>`;
  }).join("");
  const linhas=p.map((x,i)=>`<tr onclick="_g.verMes(${i})" style="background:${i%2?'var(--bg)':'#fff'};border-bottom:1px solid var(--line);cursor:pointer">
    <td style="padding:10px 12px;font-size:13px;font-weight:600">${x.mes}/${String(x.ano).slice(2)} <span style="color:var(--cyan);font-size:11px">›</span></td>
    <td style="padding:10px 12px;font-size:13px;text-align:right;color:${x.total>state.renda?'var(--guava)':x.total>x.ideal?'var(--graphite)':'var(--ink)'}">${fmt(x.total)}</td>
    <td style="padding:10px 12px;font-size:13px;text-align:right;color:var(--mute)">${fmt(x.ideal)}</td>
    <td style="padding:10px 12px;font-size:13px;text-align:right;font-weight:700;color:${x.sobra>=0?'var(--green)':'var(--guava)'}">${x.sobra>=0?'+':''}${fmt(x.sobra)}</td></tr>`).join("");
  const leg=[["Fixas","var(--graphite)"],["Estimadas","var(--green)"],["Eventuais","var(--blue)"],["Parcelas","var(--guava)"]]
    .map(([l,c])=>`<span style="font-size:11px;color:var(--mute);display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:${c}"></span>${l}</span>`).join("");
  return `<div style="padding-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2>Projeção</h2>
      <div class="toggle">
        <button class="${state.horizonte===12?'on':''}" onclick="_g.setHor(12)">12m</button>
        <button class="${state.horizonte===18?'on':''}" onclick="_g.setHor(18)">18m</button>
      </div>
    </div>
    <div style="font-size:13px;color:${estouro?'var(--guava)':'var(--mute)'};margin-bottom:10px">${aviso}</div>
    <div class="card">
      <div style="display:flex;align-items:flex-end;gap:3px;height:150px;padding-top:6px;overflow-x:auto">${barras}</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap">${leg}</div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr style="background:var(--graphite);color:#fff;font-size:11px;font-weight:700">
        <td style="padding:10px 12px">Mês</td><td style="padding:10px 12px;text-align:right">Gasto</td>
        <td style="padding:10px 12px;text-align:right">Ideal</td><td style="padding:10px 12px;text-align:right">Saldo</td>
      </tr></thead><tbody>${linhas}</tbody></table>
    </div>
  </div>`;
}

// ---------- Detalhe de um mês ----------
function viewDetalheMes(){
  const i=mesDetalhe||0;
  const p=projecao(), x=p[i]; if(!x) return viewProj();
  const itens=itensDoMes(i);
  const grupos={ordinaria:[],estimada:[],eventual:[],parcela:[]};
  itens.forEach(it=>grupos[it.natureza].push(it));
  const sec=(nat,titulo,total)=>{
    const arr=grupos[nat]; if(!arr.length) return "";
    const linhas=arr.map(it=>{
      const extra=it.natureza==="parcela"?` · parcela ${it._parcelaNum}/${it._totalParc}`:
        it.natureza==="estimada"?` · ${fmt(+it.min||0)}–${fmt(+it.max||0)}`:"";
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)">
        <div style="min-width:0"><div style="font-size:13.5px;font-weight:600">${it.nome}</div>
        <div style="font-size:11px;color:var(--mute)">${it.cat}${extra}</div></div>
        <div style="font-weight:700;font-size:13.5px;color:${NAT_COR[nat]}">${fmt(it._v)}</div></div>`;
    }).join("");
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <span style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700"><span style="width:9px;height:9px;border-radius:3px;background:${NAT_COR[nat]}"></span>${titulo}</span>
      <span style="font-weight:800;color:${NAT_COR[nat]}">${fmt(total)}</span></div>${linhas}</div>`;
  };
  const over=x.total>state.renda;
  return `<div style="padding-top:10px">
    <button onclick="_g.voltarProj()" style="background:none;border:none;color:var(--cyan);font-size:14px;font-weight:700;padding:6px 0;display:flex;align-items:center;gap:5px">‹ voltar à projeção</button>
    <div class="card" style="background:var(--grad-dash);border:none;color:#fff">
      <div style="font-size:12px;color:var(--cyan);font-weight:700">${i===0?'ESTE MÊS':'DAQUI A '+i+(i===1?' MÊS':' MESES')}</div>
      <div style="font-size:24px;font-weight:800;margin:2px 0 10px">${x.mes}/${x.ano}</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <div><div style="font-size:10.5px;color:var(--cyan)">Renda do mês</div><div style="font-size:18px;font-weight:800;color:#fff">${fmt(x.rendaMes)}${x.extra>0?` <span style="font-size:11px;color:var(--ggreen)">+${fmt(x.extra)}</span>`:""}</div></div>
        <div><div style="font-size:10.5px;color:var(--cyan)">Gasto previsto</div><div style="font-size:18px;font-weight:800;color:${over?'var(--gpink)':'#fff'}">${fmt(x.total)}</div></div>
        <div><div style="font-size:10.5px;color:var(--cyan)">Saldo do mês</div><div style="font-size:18px;font-weight:800;color:${x.sobra>=0?'var(--ggreen)':'var(--gpink)'}">${x.sobra>=0?'+':''}${fmt(x.sobra)}</div></div>
      </div>
      ${over?`<div style="margin-top:10px;background:rgba(255,101,132,.2);border-radius:10px;padding:8px 10px;font-size:12px">⚠️ Neste mês os gastos ultrapassam a renda em ${fmt(-x.sobra)}. Veja abaixo o que mais pesa.</div>`:""}
    </div>
    ${receitasDoMes(i)}
    ${sec("ordinaria","Fixas (ordinárias)",x.fixo)}
    ${sec("estimada","Estimadas",x.estimado)}
    ${sec("eventual","Eventuais deste mês",x.eventual)}
    ${sec("parcela","Parcelas do cartão",x.parcela)}
    ${x.parcela>0?`<div style="font-size:11.5px;color:var(--cyan);text-align:center;padding:2px 10px 10px">💡 As parcelas vão diminuindo conforme cada compra termina — veja a evolução voltando à projeção.</div>`:""}
  </div>`;
}
function receitasDoMes(i){
  const rs=(state.receitas||[]).filter(r=>(+r.mesIdx||0)===i);
  if(!rs.length) return "";
  const total=rs.reduce((s,r)=>s+(+r.valor||0),0);
  const linhas=rs.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)"><div style="font-size:13.5px;font-weight:600">${r.nome}</div><div style="font-weight:700;font-size:13.5px;color:var(--emerald)">+${fmt(r.valor)}</div></div>`).join("");
  return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
    <span style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700"><span style="width:9px;height:9px;border-radius:3px;background:var(--ggreen)"></span>💰 Receitas extras deste mês</span>
    <span style="font-weight:800;color:var(--emerald)">+${fmt(total)}</span></div>${linhas}</div>`;
}
G.verMes=i=>{ mesDetalhe=i; tab="detalheMes"; render(); window.scrollTo(0,0); };
G.voltarProj=()=>{ tab="proj"; render(); window.scrollTo(0,0); };

// ---------- Despesas ----------
function viewDespesas(){
  garanteMesRef();
  const grupos=["ordinaria","estimada","eventual","parcela"];
  const vis=filtroDesp==="todos"?state.itens:state.itens.filter(i=>i.natureza===filtroDesp);
  const pills=["todos",...grupos].map(g=>{
    const on=filtroDesp===g, cor=NAT_COR[g]||"var(--blue)";
    const txt=g==="todos"?"Todas":NAT_LABEL[g].split(" ")[0];
    return `<button class="pill" onclick="_g.setFiltro('${g}')" style="${on?`background:${cor};color:#fff;border-color:${cor}`:''}">${txt}</button>`;
  }).join("");
  // progresso de pagamento do mês
  let previsto=0, pagoTot=0;
  for(const it of state.itens){ const v=valorMes(it); if(v>0){ previsto+=v; if(estaPago(it.id)) pagoTot+=v; } }
  const pct=previsto>0?Math.round((pagoTot/previsto)*100):0;
  const cab=`<div class="card" style="background:var(--greenSoft);border-color:#BFE0D2">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <span style="font-size:12.5px;font-weight:700;color:var(--green)">Pagamentos de ${state.mesRef}</span>
      <span style="font-size:12.5px;font-weight:700;color:var(--green)">${fmt(pagoTot)} / ${fmt(previsto)}</span>
    </div>
    <div class="barTrack" style="background:#CDE3D3;margin-top:8px"><div style="width:${pct}%;height:100%;border-radius:8px;background:var(--green)"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
      <span style="font-size:11.5px;color:var(--green)">${pct}% pago este mês</span>
      <button onclick="_g.fecharMes()" style="background:var(--green);border:none;color:#fff;font-size:12px;font-weight:700;padding:8px 14px;border-radius:9px">📅 Fechar mês</button>
    </div>
  </div>`;
  const cards=vis.length?vis.map(itemCard).join(""):`<div class="card" style="text-align:center;color:var(--mute);font-size:13px;padding:28px">Nenhuma despesa aqui. Use ➕ Adicionar.</div>`;
  return `<div style="padding-top:16px"><h2 style="margin-bottom:12px">Despesas</h2>
    ${cab}
    <div style="display:flex;gap:7px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px">${pills}</div>${cards}</div>`;
}
function itemCard(it){
  const v=it.natureza==="estimada"?provavel(it):(+it.valor||0);
  const pago=estaPago(it.id);
  const sub=`${it.cat} · ${NAT_LABEL[it.natureza]}`
    +(it.natureza==="estimada"?` · ${fmt(+it.min||0)}–${fmt(+it.max||0)}`:"")
    +(it.natureza==="eventual"?` · ${MESES[(new Date().getMonth()+(+it.mesIdx||0))%12]}`:"")
    +(it.natureza==="parcela"?` · faltam ${it.restam}x`:"");
  // ação de pagamento conforme natureza
  const acaoPag = it.natureza==="parcela"
    ? `<button onclick="_g.quitarParcela('${it.id}')" style="background:var(--green);border:none;color:#fff;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px">✓ paguei esta parcela</button>`
    : `<button onclick="_g.togglePago('${it.id}')" style="background:${pago?'var(--green)':'#fff'};border:1.5px solid ${pago?'var(--green)':'var(--line)'};color:${pago?'#fff':'var(--mute)'};font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px">${pago?'✓ pago este mês':'marcar pago'}</button>`;
  return `<div class="card" style="padding:13px 14px;${pago?'opacity:.78':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:7px"><span style="width:8px;height:8px;border-radius:2px;background:${NAT_COR[it.natureza]};flex:none"></span><span style="font-weight:700;font-size:15px">${it.nome}</span>${pago?' <span style="font-size:10px;color:var(--green);font-weight:700">PAGO</span>':''}</div>
        <div style="font-size:11.5px;color:var(--mute);margin-top:3px;margin-left:15px">${sub}</div>
      </div>
      <div style="text-align:right;flex:none">
        <div style="font-weight:800;font-size:15px;color:${NAT_COR[it.natureza]}">${fmt(v)}${it.natureza==="estimada"?' <span style="font-size:10px;color:var(--mute)">~</span>':''}</div>
        <div style="display:flex;gap:14px;justify-content:flex-end;margin-top:6px">
          <button onclick="_g.editar('${it.id}')" style="background:none;border:none;color:var(--blue);font-size:13px;font-weight:600;padding:2px">editar</button>
          <button onclick="_g.excluir('${it.id}')" style="background:none;border:none;color:var(--guava);font-size:13px;font-weight:600;padding:2px">excluir</button>
        </div>
      </div>
    </div>
    <div style="margin-top:10px;display:flex;justify-content:flex-end">${acaoPag}</div>
    <div id="ed-${it.id}" class="hidden" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--line)"></div>
  </div>`;
}
G.editar=id=>{
  const box=document.getElementById("ed-"+id);
  if(!box) return;
  if(!box.classList.contains("hidden")){ box.classList.add("hidden"); editandoId=null; return; }
  editandoId=id;
  box.classList.remove("hidden");
  renderEdicao(id);
};
function renderEdicao(id){
  const it=state.itens.find(x=>x.id===id), box=document.getElementById("ed-"+id);
  if(!it||!box) return;
  const campo=(lb,key,val,type="text")=>`<label class="fld">${lb}<input class="inp" type="${type}" ${type==='number'?'inputmode="numeric"':''} value="${escapeAttr(val)}" oninput="_g.campo('${id}','${key}',this.value,${type==='number'})"></label>`;
  // seletor de natureza (reclassificação)
  const natBtn=nat=>`<button onclick="_g.setNatItem('${id}','${nat}')" style="flex:1;padding:8px 0;border-radius:9px;border:1.5px solid ${it.natureza===nat?NAT_COR[nat]:'var(--line)'};background:${it.natureza===nat?NAT_COR[nat]:'#F4F0FA'};color:${it.natureza===nat?'#fff':'var(--mute)'};font-size:11px;font-weight:700">${NAT_LABEL[nat].split(" ")[0]}</button>`;
  let html=`<label class="fld" style="margin-bottom:2px">Tipo de despesa</label>
    <div style="display:flex;gap:5px;margin-bottom:10px">${["ordinaria","estimada","eventual","parcela"].map(natBtn).join("")}</div>`;
  html+=campo("Nome","nome",it.nome);
  if(it.natureza==="estimada") html+=`<div style="display:flex;gap:8px">${campo("Mínimo (R$)","min",it.min,"number")}${campo("Máximo (R$)","max",it.max,"number")}</div>`;
  else html+=campo(it.natureza==="parcela"?"Valor da parcela (R$)":(it.natureza==="ordinaria"?"Valor mensal (R$)":"Valor (R$)"),"valor",it.valor,"number");
  if(it.natureza==="parcela") html+=campo("Parcelas restantes","restam",it.restam,"number");
  if(it.natureza==="eventual") html+=campo("Daqui a quantos meses (0=este)","mesIdx",it.mesIdx||0,"number");
  html+=`<label class="fld">Categoria<select class="inp" onchange="_g.campo('${id}','cat',this.value,false)">${CATEGORIAS.map(c=>`<option ${c===it.cat?'selected':''}>${c}</option>`).join("")}</select></label>`;
  box.innerHTML=`<div>${html}</div><button class="btnG" style="margin-top:12px;width:100%" onclick="_g.editar('${id}')">fechar edição</button>`;
}
// reclassifica a natureza de um item já existente, preenchendo defaults
G.setNatItem=(id,nat)=>{
  const it=state.itens.find(x=>x.id===id); if(!it||it.natureza===nat) return;
  const base=+it.valor || (it.min!=null?Math.round((+it.min+ +it.max)/2):0);
  const patch={natureza:nat};
  if(nat==="estimada"){ patch.min=it.min!=null?it.min:(base?Math.round(base*0.8):0); patch.max=it.max!=null?it.max:(base?Math.round(base*1.2):0); patch.valor=undefined; patch.restam=undefined; patch.total=undefined; patch.mesIdx=undefined; }
  else if(nat==="parcela"){ patch.valor=base||0; patch.restam=it.restam!=null?it.restam:2; patch.total=(base||0)*(it.restam!=null?it.restam:2); patch.min=undefined; patch.max=undefined; patch.mesIdx=undefined; }
  else if(nat==="eventual"){ patch.valor=base||0; patch.mesIdx=it.mesIdx!=null?it.mesIdx:0; patch.min=undefined; patch.max=undefined; patch.restam=undefined; patch.total=undefined; }
  else { patch.valor=base||0; patch.min=undefined; patch.max=undefined; patch.restam=undefined; patch.total=undefined; patch.mesIdx=undefined; }
  // aplica removendo chaves indefinidas
  state.itens=state.itens.map(x=>{ if(x.id!==id) return x; const novo={...x,...patch}; Object.keys(novo).forEach(k=>novo[k]===undefined&&delete novo[k]); return novo; });
  salvar();
  editandoId=id;
  render(); // re-renderiza a lista (atualiza valor/subtítulo do card) e reabre a edição
};
G.campo=(id,key,val,num)=>{
  const patch={[key]:num?(val===""?0:Number(val)):val};
  if(key==="valor"||key==="restam"){
    const it=state.itens.find(x=>x.id===id);
    if(it&&it.natureza==="parcela"){ const valor=key==="valor"?Number(val)||0:(+it.valor||0); const restam=key==="restam"?Number(val)||0:(+it.restam||0); patch.total=valor*restam; }
  }
  atualizar(id,patch);
};

const OBJ_TEMAS={
  viagem:{emoji:"✈️",label:"Viagem"}, carro:{emoji:"🚗",label:"Carro"},
  casa:{emoji:"🏠",label:"Casa"}, estudo:{emoji:"🎓",label:"Estudo"},
  reserva:{emoji:"🛟",label:"Reserva"}, outro:{emoji:"⭐",label:"Outro"},
};

// capacidade de poupança mensal (referência p/ estimativas)
function poupancaMensal(){ return Math.max(state.renda*state.metaPct,1); }
// apreciação (determinística) de quão perto/longe está a meta — funciona sem IA
function apreciarObjetivo(o){
  const alvo=+o.alvo||0, guardado=+o.guardado||0, falta=Math.max(alvo-guardado,0);
  const pct=alvo>0?Math.min(guardado/alvo,1):0;
  if(pct>=1) return {pct, txt:`🎉 Meta alcançada! Você já tem o suficiente para ${o.titulo}.`, cor:"var(--emerald)"};
  const mensal=poupancaMensal();
  const meses=Math.ceil(falta/mensal);
  let txt=`Você está a <b>${Math.round(pct*100)}%</b> de ${o.titulo}. Faltam <b>${fmt(falta)}</b>. No seu ritmo de guardar ${fmt(mensal)}/mês, chega em <b>~${meses} ${meses===1?'mês':'meses'}</b>.`;
  let cor="var(--nu)";
  if(o.prazoMeses){
    if(meses<=o.prazoMeses){ txt+=` Está no caminho para o prazo de ${o.prazoMeses} meses. 💪`; cor="var(--emerald)"; }
    else { txt+=` Nesse ritmo passa do prazo em <b>${meses-o.prazoMeses} ${(meses-o.prazoMeses)===1?'mês':'meses'}</b> — vale aumentar o aporte.`; cor="var(--amber)"; }
  }
  return {pct, txt, cor};
}
